<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>五子棋 - 多人联机版 | AI小游戏平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --board-color: #DEB887;
            --board-dark: #C4A574;
            --line-color: #8B4513;
            --black-stone: #1a1a1a;
            --white-stone: #f5f5f5;
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --bg-dark: #1a1a2e;
            --bg-light: #16213e;
            --accent: #e94560;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        /* 屏幕容器 */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            opacity: 0;
            transform: translateY(16px);
        }
        .screen.active {
            display: flex;
            animation: screenFadeIn 0.35s ease forwards;
        }
        @keyframes screenFadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 大厅界面 */
        .lobby-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 3.5rem;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: none;
            margin-bottom: 10px;
        }

        .lobby-subtitle {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 30px;
        }

        .lobby-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 420px;
            width: 100%;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--gold);
            font-size: 1rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            background: rgba(255,255,255,0.15);
        }

        .input-group input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 15px 30px;
            margin: 12px 0;
            font-size: 1.1rem;
            font-weight: 600;
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212,175,55,0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212,175,55,0.4);
        }

        .btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 2px solid var(--gold);
            box-shadow: none;
        }

        .btn.secondary:hover {
            background: rgba(212,175,55,0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255,255,255,0.4);
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.2);
        }

        .divider span { padding: 0 15px; }

        /* 房间界面 */
        .room-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .room-code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--gold);
            letter-spacing: 6px;
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            border: 2px solid var(--gold);
        }

        .room-code-label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
        }

        .copy-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: rgba(212,175,55,0.2);
        }

        .room-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
        }

        .players-list {
            margin-bottom: 25px;
        }

        .player-slot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.08);
            border: 2px dashed rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 12px;
            transition: all 0.3s;
        }

        .player-slot.filled {
            border-style: solid;
            border-color: var(--gold);
        }

        .player-slot.ready {
            border-color: #2ecc71;
            background: rgba(46,204,113,0.1);
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .player-stone {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .player-stone.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
        }

        .player-stone.white {
            background: radial-gradient(circle at 30% 30%, #ffffff, #d0d0d0);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .player-status {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .player-status.ready {
            color: #2ecc71;
        }

        .room-actions {
            display: flex;
            gap: 12px;
        }

        .room-actions .btn {
            flex: 1;
        }

        /* 游戏界面 */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
        }

        .game-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-turn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: all 0.3s;
        }
        .game-avatar {
            width: 28px;
            height: 28px;
            border-radius: 7px;
            object-fit: cover;
        }

        .player-turn.active {
            background: var(--gold);
            color: #1a1a1a;
        }

        .player-turn .stone-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .stone-indicator.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
        }

        .stone-indicator.white {
            background: radial-gradient(circle at 30% 30%, #ffffff, #d0d0d0);
            border: 1px solid rgba(0,0,0,0.2);
        }

        /* 棋盘 */
        .board-wrapper {
            position: relative;
            padding: 15px;
            background: linear-gradient(135deg, var(--board-color) 0%, var(--board-dark) 100%);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4), inset 0 2px 10px rgba(255,255,255,0.2);
            overflow: hidden;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 36px);
            grid-template-rows: repeat(15, 36px);
            gap: 0;
            position: relative;
        }

        @media (max-width: 600px) {
            .board {
                grid-template-columns: repeat(15, calc((100vw - 80px) / 15));
                grid-template-rows: repeat(15, calc((100vw - 80px) / 15));
            }
        }

        .board::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 18px;
            right: 18px;
            bottom: 18px;
            background-image: 
                linear-gradient(var(--line-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--line-color) 1px, transparent 1px);
            background-size: 36px 36px;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .board::before {
                top: calc((100vw - 80px) / 30);
                left: calc((100vw - 80px) / 30);
                right: calc((100vw - 80px) / 30);
                bottom: calc((100vw - 80px) / 30);
                background-size: calc((100vw - 80px) / 15) calc((100vw - 80px) / 15);
            }
        }

        .cell {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .cell:hover::after {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            border-radius: 50%;
            background: rgba(212,175,55,0.3);
            pointer-events: none;
        }

        .cell.disabled {
            cursor: not-allowed;
        }

        .cell.disabled:hover::after {
            display: none;
        }

        .stone {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            position: relative;
            z-index: 2;
            transition: transform 0.1s;
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #ffffff, #d0d0d0);
            box-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stone.last-flash {
            animation: lastStoneFlash 0.6s ease-out 3;
        }

        .stone.last-flash::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 7px; height: 7px;
            transform: translate(-50%, -50%);
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 68, 68, 0.7);
            animation: redDotFade 1.8s ease-out forwards;
        }

        @keyframes lastStoneFlash {
            0% { box-shadow: 0 0 0 0 rgba(255, 200, 0, 0.8), 0 0 10px rgba(255, 200, 0, 0.5); }
            100% { box-shadow: 0 0 0 10px rgba(255, 200, 0, 0), 0 0 0 rgba(255, 200, 0, 0); }
        }

        @keyframes redDotFade {
            0%, 70% { opacity: 1; }
            100% { opacity: 0; }
        }

        .stone.winning {
            animation: winning 0.5s ease-in-out infinite alternate;
        }

        @keyframes winning {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        /* 星位点 - 使用CSS定位 */
        .star-point {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--line-color);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
        
        @media (max-width: 520px) {
            .star-point {
                width: 6px;
                height: 6px;
            }
        }

        /* 游戏状态 */
        .game-status {
            text-align: center;
            padding: 15px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 1.1rem;
        }

        .game-status.your-turn {
            background: linear-gradient(135deg, rgba(212,175,55,0.3) 0%, rgba(184,134,11,0.3) 100%);
            border: 1px solid var(--gold);
        }

        /* 结果弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active { display: flex; }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-light) 100%);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-title {
            font-family: 'ZCOOL KuaiLe', cursive;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 15px;
        }

        .modal-message {
            font-size: 1.1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
        }

        .winner-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }

        .winner-stone {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        .winner-stone.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #1a1a1a);
            box-shadow: 3px 3px 8px rgba(0,0,0,0.4);
        }

        .winner-stone.white {
            background: radial-gradient(circle at 30% 30%, #ffffff, #d0d0d0);
            box-shadow: 3px 3px 8px rgba(0,0,0,0.2);
        }

        /* Toast提示 */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 0.95rem;
            z-index: 2000;
            animation: toastIn 0.3s ease, toastOut 0.3s ease 1.7s forwards;
        }
        .toast.toast-error {
            background: rgba(60, 10, 10, 0.95);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.3);
        }
        .toast.toast-success {
            background: rgba(10, 50, 20, 0.95);
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.3);
        }
        .toast.toast-warning {
            background: rgba(50, 30, 5, 0.95);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.3);
        }

        @keyframes toastIn {
            from { opacity: 0; transform: translate(-50%, 20px); }
            to { opacity: 1; transform: translate(-50%, 0); }
        }

        @keyframes toastOut {
            to { opacity: 0; transform: translate(-50%, -20px); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* 返回链接 */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        .invite-btn {
            background: #10b981;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 10px;
            font-size: 0.85rem;
            margin-left: 8px;
            transition: all 0.3s;
        }
        .invite-btn:hover { background: #059669; }

        .share-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 9500;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .share-modal.active { display: flex; }

        .share-modal-content {
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(233,69,96,0.2);
            border-radius: 20px;
            padding: 30px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }
        .share-modal-title {
            font-family: 'Noto Sans SC', sans-serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--accent);
            margin-bottom: 20px;
        }
        .share-qrcode {
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 20px;
        }
        .share-qrcode canvas { display: block; }

        .share-link-section {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .share-link-label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 8px;
        }
        .share-link-box {
            display: flex;
            gap: 10px;
        }
        .share-link-input {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.85rem;
            text-overflow: ellipsis;
        }
        .share-copy-btn {
            padding: 10px 15px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
        }
        .share-copy-btn.copied {
            background: #10b981;
        }
        .share-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }
        .share-action-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }
        .share-action-btn.primary {
            background: var(--accent);
            color: #fff;
        }
        .share-action-btn.secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .chat-toggle-btn {
            position: fixed;
            bottom: calc(20px + env(safe-area-inset-bottom, 0px));
            left: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #c0392b);
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            z-index: 1200;
            box-shadow: 0 4px 14px rgba(0,0,0,0.35);
            display: none;
            align-items: center;
            justify-content: center;
        }
        .chat-toggle-btn.active { display: flex; }
        .chat-badge {
            position: absolute;
            top: -5px; right: -5px;
            background: #fbbf24;
            color: #1a1a1a;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 6px;
            border-radius: 10px;
            display: none;
        }
        .chat-badge.active { display: block; }

        .chat-panel {
            display: none;
            position: fixed;
            bottom: calc(80px + env(safe-area-inset-bottom, 0px));
            left: 20px;
            width: 300px;
            max-height: 380px;
            background: rgba(15,23,42,0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(233,69,96,0.2);
            border-radius: 15px;
            overflow: hidden;
            z-index: 1300;
            flex-direction: column;
        }
        .chat-panel.active { display: flex; }

        .chat-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(233,69,96,0.15);
            border-bottom: 1px solid rgba(233,69,96,0.15);
            font-weight: bold;
            font-size: 0.9rem;
        }
        .chat-panel-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            max-height: 180px;
            min-height: 60px;
        }
        .chat-msg {
            padding: 4px 0;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .chat-msg .chat-sender {
            font-weight: bold;
        }
        .chat-msg .chat-sender.black { color: #a78bfa; }
        .chat-msg .chat-sender.white { color: #38bdf8; }
        .chat-msg .chat-text { color: #e2e8f0; }

        .chat-shortcuts {
            padding: 8px 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

    <script>
        // 游戏状态
        let socket = null;
        let currentRoom = null;
        let myColor = null; // 'black' or 'white'
        let isMyTurn = false;
        let gameBoard = [];
        let isReady = false;
        let isAIMode = false;
        let username = '';
        let myAvatarSrc = '../img/avatar_female1.png';

        function pickAvatar(btn, src) {
            document.querySelectorAll('.avatar-pick').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            myAvatarSrc = src;
            localStorage.setItem('gomoku_avatar', src);
        }

        // 初始化棋盘数据
        function initBoard() {
            gameBoard = Array(15).fill(null).map(() => Array(15).fill(null));
        }

        // 渲染棋盘
        function renderBoard() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    if (gameBoard[row][col]) {
                        const stone = document.createElement('div');
                        stone.className = `stone ${gameBoard[row][col]}`;
                        cell.appendChild(stone);
                        cell.classList.add('disabled');
                    }
                    
                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardEl.appendChild(cell);
                }
            }
            
            // 添加星位点（延迟确保DOM和CSS完全渲染）
            setTimeout(addStarPoints, 100);
        }

        // 添加星位点
        function addStarPoints() {
            const boardEl = document.getElementById('board');
            const positions = [
                [3, 3], [3, 7], [3, 11],
                [7, 3], [7, 7], [7, 11],
                [11, 3], [11, 7], [11, 11]
            ];
            
            // 直接从实际渲染的格子获取大小（更可靠）
            const firstCell = boardEl.querySelector('.cell');
            if (!firstCell) return;
            
            const cellSize = firstCell.offsetWidth;
            const starSize = cellSize <= 22 ? 6 : 8;
            // 棋盘网格线的偏移量（cellSize的一半）
            const offset = cellSize / 2;
            
            console.log('星位点计算 - cellSize:', cellSize, 'starSize:', starSize);
            
            positions.forEach(([row, col]) => {
                if (!gameBoard[row][col]) {
                    const star = document.createElement('div');
                    star.className = 'star-point';
                    // 星位点在交叉点中心
                    star.style.left = `${col * cellSize + offset - starSize / 2}px`;
                    star.style.top = `${row * cellSize + offset - starSize / 2}px`;
                    boardEl.appendChild(star);
                }
            });
        }

        // 点击格子
        function handleCellClick(row, col) {
            if (!isMyTurn) {
                showToast('还没轮到你');
                return;
            }
            
            if (gameBoard[row][col]) {
                showToast('这里已经有棋子了');
                return;
            }
            
            // 落子
            placeStone(row, col, myColor);
            
            if (isAIMode) {
                // AI模式 - 记录落子历史
                moveHistory.push({ row, col, color: myColor });
                
                isMyTurn = false;
                updateTurnDisplay();
                
                // 检查胜负
                if (checkWin(row, col, myColor)) {
                    showResult(true, myColor);
                    return;
                }
                
                // AI落子
                setTimeout(() => {
                    aiMove();
                }, 500);
            } else {
                // 联机模式
                socket.emit('place_stone', { row, col });
                isMyTurn = false;
                updateTurnDisplay();
            }
        }

        // 落子
        function placeStone(row, col, color) {
            gameBoard[row][col] = color;
            
            const boardEl = document.getElementById('board');
            const cellIndex = row * 15 + col;
            const cell = boardEl.children[cellIndex];
            if (!cell) return;
            
            // 如果格子里已经有同色棋子（自己先落的本地棋子），跳过重复渲染，但仍要触发闪烁
            const existing = cell.querySelector('.stone');
            if (existing && existing.classList.contains(color)) {
                existing.classList.remove('last-flash');
                void existing.offsetWidth;
                existing.classList.add('last-flash');
                return;
            }

            // 移除之前的闪烁标记
            boardEl.querySelectorAll('.stone.last-flash').forEach(s => s.classList.remove('last-flash'));
            
            const stone = document.createElement('div');
            stone.className = `stone ${color} last-flash`;
            cell.innerHTML = '';
            cell.appendChild(stone);
            cell.classList.add('disabled');
            
            // 动画结束后移除闪烁类
            setTimeout(() => stone.classList.remove('last-flash'), 2000);
            
            // 播放音效
            playSound();
        }

        // 播放音效
        function playSound() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }

        // 检查胜负
        function checkWin(row, col, color) {
            const directions = [
                [[0, 1], [0, -1]],   // 横
                [[1, 0], [-1, 0]],   // 竖
                [[1, 1], [-1, -1]], // 斜
                [[1, -1], [-1, 1]]  // 反斜
            ];
            
            for (const [dir1, dir2] of directions) {
                let count = 1;
                const winningCells = [[row, col]];
                
                // 方向1
                let r = row + dir1[0], c = col + dir1[1];
                while (r >= 0 && r < 15 && c >= 0 && c < 15 && gameBoard[r][c] === color) {
                    count++;
                    winningCells.push([r, c]);
                    r += dir1[0];
                    c += dir1[1];
                }
                
                // 方向2
                r = row + dir2[0];
                c = col + dir2[1];
                while (r >= 0 && r < 15 && c >= 0 && c < 15 && gameBoard[r][c] === color) {
                    count++;
                    winningCells.push([r, c]);
                    r += dir2[0];
                    c += dir2[1];
                }
                
                if (count >= 5) {
                    // 标记获胜棋子
                    highlightWinning(winningCells);
                    return true;
                }
            }
            
            return false;
        }

        // 高亮获胜棋子
        function highlightWinning(cells) {
            const boardEl = document.getElementById('board');
            cells.forEach(([row, col]) => {
                const cellIndex = row * 15 + col;
                const stone = boardEl.children[cellIndex]?.querySelector('.stone');
                if (stone) {
                    stone.classList.add('winning');
                }
            });
        }

        // AI落子
        function aiMove() {
            const move = findBestMove();
            if (move) {
                placeStone(move.row, move.col, 'white');
                
                // 记录AI落子历史
                moveHistory.push({ row: move.row, col: move.col, color: 'white' });
                
                if (checkWin(move.row, move.col, 'white')) {
                    showResult(false, 'white');
                    return;
                }
                
                isMyTurn = true;
                updateTurnDisplay();
            }
        }

        // AI寻找最佳落子（简单AI）
        function findBestMove() {
            let bestScore = -Infinity;
            let bestMove = null;
            
            // 评估每个空位
            for (let row = 0; row < 15; row++) {
                for (let col = 0; col < 15; col++) {
                    if (!gameBoard[row][col]) {
                        const score = evaluatePosition(row, col);
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = { row, col };
                        }
                    }
                }
            }
            
            return bestMove;
        }

        // 评估位置分数
        function evaluatePosition(row, col) {
            let score = 0;
            
            // AI进攻分数
            score += getLineScore(row, col, 'white') * 1.1;
            // 防守分数
            score += getLineScore(row, col, 'black');
            
            // 中心位置加分
            const centerDist = Math.abs(row - 7) + Math.abs(col - 7);
            score += (14 - centerDist) * 0.5;
            
            return score;
        }

        // 获取某方向的分数
        function getLineScore(row, col, color) {
            const directions = [
                [0, 1], [1, 0], [1, 1], [1, -1]
            ];
            
            let totalScore = 0;
            
            for (const [dr, dc] of directions) {
                let count = 1;
                let blocked = 0;
                let space = 0;
                
                // 正方向
                let r = row + dr, c = col + dc;
                while (r >= 0 && r < 15 && c >= 0 && c < 15) {
                    if (gameBoard[r][c] === color) {
                        count++;
                    } else if (gameBoard[r][c] === null) {
                        space++;
                        break;
                    } else {
                        blocked++;
                        break;
                    }
                    r += dr;
                    c += dc;
                }
                
                // 反方向
                r = row - dr;
                c = col - dc;
                while (r >= 0 && r < 15 && c >= 0 && c < 15) {
                    if (gameBoard[r][c] === color) {
                        count++;
                    } else if (gameBoard[r][c] === null) {
                        space++;
                        break;
                    } else {
                        blocked++;
                        break;
                    }
                    r -= dr;
                    c -= dc;
                }
                
                // 评分
                if (count >= 5) totalScore += 100000;
                else if (count === 4 && blocked === 0) totalScore += 10000;
                else if (count === 4 && blocked === 1) totalScore += 1000;
                else if (count === 3 && blocked === 0) totalScore += 1000;
                else if (count === 3 && blocked === 1) totalScore += 100;
                else if (count === 2 && blocked === 0) totalScore += 100;
                else if (count === 2 && blocked === 1) totalScore += 10;
                else if (count === 1) totalScore += 1;
            }
            
            return totalScore;
        }

        // 更新回合显示
        function updateTurnDisplay() {
            const blackTurn = document.getElementById('blackTurn');
            const whiteTurn = document.getElementById('whiteTurn');
            const status = document.getElementById('gameStatus');
            
            if (isMyTurn) {
                if (myColor === 'black') {
                    blackTurn.classList.add('active');
                    whiteTurn.classList.remove('active');
                } else {
                    whiteTurn.classList.add('active');
                    blackTurn.classList.remove('active');
                }
                status.textContent = '轮到你落子';
                status.classList.add('your-turn');
            } else {
                if (myColor === 'black') {
                    whiteTurn.classList.add('active');
                    blackTurn.classList.remove('active');
                } else {
                    blackTurn.classList.add('active');
                    whiteTurn.classList.remove('active');
                }
                status.textContent = isAIMode ? 'AI思考中...' : '等待对手落子...';
                status.classList.remove('your-turn');
            }
        }

        // 连接服务器
        function connectServer() {
            const isLocal = ['localhost', '127.0.0.1'].includes(window.location.hostname);
            const serverUrl = isLocal ? `http://${window.location.hostname}:3000` : window.location.origin;
            
            const rawPath = window.location.pathname.replace(/\/gomoku\/?.*$/i, '').replace(/\/$/, '');
            const socketPath = (rawPath && !isLocal) ? `${rawPath}/socket.io` : '/socket.io';
            
            console.log('[五子棋] 连接:', serverUrl, 'namespace=/gomoku, path=' + socketPath);
            
            socket = io(serverUrl + '/gomoku', {
                path: socketPath,
                timeout: 10000,
                reconnection: true,
                reconnectionAttempts: Infinity,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 10000,
                transports: ['websocket', 'polling'],
                upgrade: true
            });
            
            socket.on('connect', () => {
                console.log('已连接到服务器');
                updateConnStatus('connected');

                // 断线重连：尝试回到之前的房间
                const savedRoom = sessionStorage.getItem('gomoku_room');
                if (savedRoom && currentRoom) {
                    console.log('[五子棋] 重连，尝试回到房间:', savedRoom);
                    socket.emit('join_room', { roomCode: savedRoom, username, avatar: myAvatarSrc });
                } else {
                    checkAutoJoin();
                }
            });
            
            socket.on('connect_error', (err) => {
                console.error('连接失败:', err.message);
                updateConnStatus('disconnected');
                showToast('连接服务器失败: ' + err.message, 2000, 'error');
            });

            socket.io.on('reconnect_attempt', () => {
                updateConnStatus('reconnecting');
            });

            socket.on('chat_message', (data) => {
                appendChatMessage(data);
            });
            
            socket.on('room_created', (data) => {
                currentRoom = data.roomCode;
                sessionStorage.setItem('gomoku_room', data.roomCode);
                document.getElementById('displayRoomCode').textContent = data.roomCode;
                switchScreen('roomScreen');
                updateRoomPlayers(data.players);
            });
            
            socket.on('room_joined', (data) => {
                currentRoom = data.roomCode;
                sessionStorage.setItem('gomoku_room', data.roomCode);
                document.getElementById('displayRoomCode').textContent = data.roomCode;
                switchScreen('roomScreen');
                updateRoomPlayers(data.players);
            });
            
            socket.on('join_error', (data) => {
                showToast(data.message, 2000, 'error');
                sessionStorage.removeItem('gomoku_room');
                currentRoom = null;
            });
            
            socket.on('room_updated', (data) => {
                updateRoomPlayers(data.players);
            });
            
            socket.on('game_started', (data) => {
                myColor = data.yourColor;
                isMyTurn = data.yourColor === 'black';
                initBoard();
                renderBoard();
                
                document.getElementById('blackName').textContent = data.blackPlayer;
                document.getElementById('whiteName').textContent = data.whitePlayer;
                if (data.blackAvatar) document.getElementById('blackAvatar').src = data.blackAvatar;
                if (data.whiteAvatar) document.getElementById('whiteAvatar').src = data.whiteAvatar;
                
                updateTurnDisplay();
                switchScreen('gameScreen');
            });
            
            // 断线重连恢复游戏状态
            socket.on('game_reconnect', (data) => {
                myColor = data.yourColor;
                gameBoard = data.board;
                isMyTurn = data.currentTurn === myColor;

                document.getElementById('blackName').textContent = data.blackPlayer;
                document.getElementById('whiteName').textContent = data.whitePlayer;
                if (data.blackAvatar) document.getElementById('blackAvatar').src = data.blackAvatar;
                if (data.whiteAvatar) document.getElementById('whiteAvatar').src = data.whiteAvatar;

                renderBoard();
                // 重绘已有棋子
                const boardEl = document.getElementById('board');
                for (let r = 0; r < 15; r++) {
                    for (let c = 0; c < 15; c++) {
                        if (gameBoard[r][c]) {
                            const cell = boardEl.children[r * 15 + c];
                            const stone = document.createElement('div');
                            stone.className = `stone ${gameBoard[r][c]}`;
                            cell.innerHTML = '';
                            cell.appendChild(stone);
                            cell.classList.add('disabled');
                        }
                    }
                }
                // 标记最后一步
                if (data.moveHistory && data.moveHistory.length > 0) {
                    const last = data.moveHistory[data.moveHistory.length - 1];
                    const lastCell = boardEl.children[last.row * 15 + last.col];
                    const lastStone = lastCell && lastCell.querySelector('.stone');
                    if (lastStone) lastStone.classList.add('last-flash');
                }
                updateTurnDisplay();
                switchScreen('gameScreen');
                showToast('已重连到游戏', 2000, 'success');
            });

            socket.on('player_offline', (data) => {
                showToast(`${data.username} 断线了，等待重连...`, 3000, 'warning');
            });

            socket.on('player_reconnected', (data) => {
                showToast(`${data.username} 已重连`, 2000, 'success');
            });

            socket.on('stone_placed', (data) => {
                placeStone(data.row, data.col, data.color);
                isMyTurn = data.nextColor === myColor;
                updateTurnDisplay();
            });
            
            socket.on('game_over', (data) => {
                const isWin = data.winner === myColor;
                highlightWinning(data.winningCells || []);
                setTimeout(() => {
                    showResult(isWin, data.winner);
                }, 500);
            });
            
            socket.on('opponent_left', () => {
                showToast('对手已离开', 2000, 'warning');
                switchScreen('roomScreen');
            });

            
            socket.on('play_again_request', () => {
                showConfirm('🔄 再来一局', '对手想要再来一局，是否同意？', () => {
                    socket.emit('play_again_accept');
                }, () => {
                    socket.emit('play_again_reject');
                });
            });
            
            socket.on('game_restarted', (data) => {
                myColor = data.yourColor;
                isMyTurn = data.yourColor === 'black';
                initBoard();
                renderBoard();
                if (data.blackAvatar) document.getElementById('blackAvatar').src = data.blackAvatar;
                if (data.whiteAvatar) document.getElementById('whiteAvatar').src = data.whiteAvatar;
                document.getElementById('blackName').textContent = data.blackPlayer;
                document.getElementById('whiteName').textContent = data.whitePlayer;
                updateTurnDisplay();
                resetUndoState();
                document.getElementById('resultModal').classList.remove('active');
                showToast('新一局开始！', 2000, 'success');
            });
            
            // 悔棋相关事件
            socket.on('undo_request', (data) => {
                document.getElementById('undoMessage').textContent = 
                    `${data.requesterName} 请求悔棋，是否同意？`;
                document.getElementById('undoModal').classList.add('active');
            });
            
            socket.on('undo_pending', (data) => {
                showToast(data.message);
            });
            
            socket.on('undo_success', (data) => {
                // 撤销棋子
                undoStone(data.row, data.col);
                
                // 更新回合
                isMyTurn = data.currentTurn === myColor;
                updateTurnDisplay();
                
                // 更新悔棋按钮状态
                if (data.undoUsed) {
                    updateUndoButton(data.undoUsed);
                }
                
                showToast('悔棋成功！');
                document.getElementById('undoModal').classList.remove('active');
            });
            
            socket.on('undo_rejected', () => {
                showToast('对方拒绝了悔棋请求', 2000, 'error');
            });
            
            socket.on('action_error', (data) => {
                console.log('服务器错误:', data.message);
                showToast(data.message);
            });
            
            socket.on('disconnect', () => {
                console.log('与服务器断开连接');
                updateConnStatus('disconnected');
                if (currentRoom) {
                    showToast('连接已断开，正在重连...', 3000, 'warning');
                }
            });
        }

        // 更新房间玩家列表
        function updateRoomPlayers(players) {
            const container = document.getElementById('playersList');
            container.innerHTML = '';
            
            const colors = ['black', 'white'];
            const labels = ['黑方 (先手)', '白方'];

                if (player) {
                    const avSrc = player.avatar || '../img/avatar_male1.png';
                    const avImg = avSrc.includes('img/') ? `<img src="${avSrc}" style="width:32px;height:32px;border-radius:8px;margin-right:8px;">` : '';
                    slot.innerHTML = `
                        <div class="player-info" style="display:flex;align-items:center;">
                            ${avImg}
                            <div class="player-stone ${colors[i]}"></div>
                            <span class="player-name">${player.username}</span>
                        </div>
                        <span class="player-status ${player.ready ? 'ready' : ''}">${player.ready ? '已准备' : '未准备'}</span>
                    `;
                } else {
                    slot.innerHTML = `
                        <div class="player-info">
                            <div class="player-stone ${colors[i]}"></div>
                            <span class="player-name" style="color: rgba(255,255,255,0.4);">等待玩家加入...</span>
                        </div>
                        <span class="player-status">${labels[i]}</span>
                    `;
                }
                
                container.appendChild(slot);
            }
            
            // 控制准备按钮状态：只有两个玩家都在时才能准备
            const readyBtn = document.getElementById('readyBtn');
            if (players.length < 2) {
                readyBtn.disabled = true;
                readyBtn.style.opacity = '0.5';
                readyBtn.innerHTML = '<i class="fas fa-hourglass-half"></i> 等待对手加入';
                // 如果之前点了准备，重置状态

                    isReady = false;
                    socket.emit('toggle_ready', { ready: false });
                }
            } else {
                readyBtn.disabled = false;
                readyBtn.style.opacity = '1';
                if (!isReady) {
                    readyBtn.innerHTML = '<i class="fas fa-check"></i> 准备';
                    readyBtn.classList.remove('secondary');
                }
            }
        }

                } else {
                    socket.emit('leave_room');
                    switchScreen('lobbyScreen');
                    currentRoom = null;
                    sessionStorage.removeItem('gomoku_room');
                }
            });
        }
        
        // ==================== 悔棋功能 ====================
        
        let undoUsed = false; // 本局是否已使用悔棋
        let moveHistory = []; // AI模式下的落子历史
        
        // 请求悔棋
        function requestUndo() {
            console.log('悔棋按钮点击，isAIMode:', isAIMode, 'moveHistory:', moveHistory.length);
            
            if (isAIMode) {
                // AI模式：直接悔棋
                if (undoUsed) {
                    showToast('本局已使用过悔棋机会');
                    return;
                }
                
                // 检查是否有棋可悔
                if (moveHistory.length === 0) {
                    showToast('还没有落子，无法悔棋');
                    return;
                }
                
                // 如果只有自己落了一子（还没有AI回合），只撤销自己的
                if (moveHistory.length === 1) {
                    const myMove = moveHistory.pop();
                    undoStone(myMove.row, myMove.col);
                    undoUsed = true;
                    updateUndoButton({ [myColor]: true });
                    isMyTurn = true;
                    updateTurnDisplay();
                    showToast('悔棋成功！');
                    return;
                }
                
                // 正常情况：撤销自己和AI的最后一步
                const aiMove = moveHistory.pop();
                const myMove = moveHistory.pop();
                
                undoStone(aiMove.row, aiMove.col);
                undoStone(myMove.row, myMove.col);
                
                undoUsed = true;
                updateUndoButton({ [myColor]: true });
                
                isMyTurn = true;
                updateTurnDisplay();
                showToast('悔棋成功！');
            } else {
                // 联机模式：发送悔棋请求
                if (!socket) {
                    showToast('未连接到服务器', 2000, 'error');
                    return;
                }
                if (!socket.connected) {
                    showToast('服务器连接已断开', 2000, 'error');
                    return;
                }
                console.log('发送悔棋请求到服务器');
                socket.emit('request_undo');
                showToast('悔棋请求已发送，等待对方回应...');
            }
        }
        
        // 接受悔棋
        function acceptUndo() {
            document.getElementById('undoModal').classList.remove('active');
            socket.emit('accept_undo');
        }
        
        // 拒绝悔棋
        function rejectUndo() {
            document.getElementById('undoModal').classList.remove('active');
            socket.emit('reject_undo');
        }
        
        // 撤销棋子
        function undoStone(row, col) {
            gameBoard[row][col] = null;
            
            const boardEl = document.getElementById('board');
            const cellIndex = row * 15 + col;
            const cell = boardEl.children[cellIndex];
            
            if (cell) {
                cell.innerHTML = '';
                cell.classList.remove('disabled');
            }
            
            // 更新最后落子标记
            const allStones = boardEl.querySelectorAll('.stone');
            allStones.forEach(s => s.classList.remove('last'));
            if (allStones.length > 0) {
                allStones[allStones.length - 1]?.classList.add('last');
            }
        }
        
        // 更新悔棋按钮状态
        function updateUndoButton(usedState) {
            const btn = document.getElementById('undoBtn');
            if (!btn) return;
            
            if (usedState[myColor]) {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.innerHTML = '<i class="fas fa-undo"></i> 已用';
            }
        }
        
        // 重置悔棋状态
        function resetUndoState() {
            undoUsed = false;
            moveHistory = [];
            const btn = document.getElementById('undoBtn');
            if (btn) {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.innerHTML = '<i class="fas fa-undo"></i> 悔棋';
            }
        }

        // 人机对战
        function playWithAI() {
            const input = document.getElementById('usernameInput');
            if (!input.value.trim()) {
                showToast('请先输入你的昵称', 2000, 'warning');
                input.focus();
                return;
            }
            username = input.value.trim();
            localStorage.setItem('gomoku_nickname', username);
            isAIMode = true;
            startAIGame();
        }

        // 开始AI游戏
        function startAIGame() {
            myColor = 'black';
            isMyTurn = true;
            initBoard();
            renderBoard();
            resetUndoState(); // 重置悔棋状态
            
            document.getElementById('blackName').textContent = username;
            document.getElementById('whiteName').textContent = 'AI';
            
            updateTurnDisplay();
            switchScreen('gameScreen');
        }

        function updateConnStatus(state) {
            const dot = document.getElementById('connStatus');
            if (!dot) return;
            dot.className = 'conn-status';
            if (state === 'reconnecting') { dot.classList.add('reconnecting'); dot.title = '重连中...'; }
            else if (state === 'disconnected') { dot.classList.add('disconnected'); dot.title = '已断开'; }
            else { dot.title = '已连接'; }
        }

        function toggleEyeComfort() {
            const on = document.body.classList.toggle('eye-comfort');
            document.getElementById('eyeComfortBtn').classList.toggle('active', on);
            localStorage.setItem('eye_comfort', on ? '1' : '');
        }
        if (localStorage.getItem('eye_comfort') === '1') {
            document.body.classList.add('eye-comfort');
            document.getElementById('eyeComfortBtn')?.classList.add('active');
        }

        function showConfirm(title, message, onYes, onNo) {
            const modal = document.getElementById('confirmModal');
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            const yesBtn = document.getElementById('confirmYesBtn');
            const noBtn  = document.getElementById('confirmNoBtn');
            const cleanup = () => {
                modal.classList.remove('active');
                yesBtn.replaceWith(yesBtn.cloneNode(true));
                noBtn.replaceWith(noBtn.cloneNode(true));
            };
            yesBtn.onclick = () => { cleanup(); if (onYes) onYes(); };
            noBtn.onclick  = () => { cleanup(); if (onNo) onNo(); };
            modal.classList.add('active');
        }

        // 新手引导
        (function initOnboarding() {
            if (localStorage.getItem('gomoku_onboarded')) return;
            const steps = [
                { title: '欢迎来到五子棋', text: '支持双人对战和人机对战两种模式。\n先输入你的昵称，然后选择游戏模式。' },
                { title: '游戏操作', text: '轮到你时，点击棋盘上的交叉点放置棋子。\n先连成五子的一方获胜！每局有一次悔棋机会。' }
            ];
            let cur = 0;
            function render() {
                let ov = document.getElementById('_onboardOv');
                if (!ov) {
                    ov = document.createElement('div');
                    ov.id = '_onboardOv';
                    ov.className = 'onboard-overlay';
                    ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:10000;display:flex;align-items:center;justify-content:center;';
                    document.body.appendChild(ov);
                }
                const s = steps[cur];
                const dots = steps.map((_, i) => `<div style="width:8px;height:8px;border-radius:50%;background:${i===cur?'var(--gold)':'rgba(255,255,255,0.2)'}"></div>`).join('');
                ov.innerHTML = `<div style="background:rgba(15,10,35,0.95);border:1px solid rgba(168,85,247,0.3);border-radius:16px;padding:30px;max-width:340px;width:90%;text-align:center;color:#fff;">
                    <h3 style="color:var(--gold);margin:0 0 16px;font-size:1.2rem;">${s.title}</h3>
                    <div style="display:flex;gap:6px;justify-content:center;margin-bottom:20px;">${dots}</div>
                    <p style="font-size:0.95rem;line-height:1.6;margin:0 0 20px;color:rgba(255,255,255,0.8);">${s.text.replace(/\n/g,'<br>')}</p>
                    <button id="_onboardNext" style="padding:10px 30px;border:none;border-radius:20px;background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;font-size:1rem;cursor:pointer;">${cur<steps.length-1?'下一步':'开始游戏'}</button>
                </div>`;
                document.getElementById('_onboardNext').onclick = () => {
                    cur++;
                    if (cur >= steps.length) { ov.remove(); localStorage.setItem('gomoku_onboarded','1'); }
                    else { render(); }
                };
            }
            render();
        })();

        // Toast提示 — level: 'info'(default) | 'error' | 'success' | 'warning'
        function showToast(message, duration = 2000, level = 'info') {
            const existing = document.querySelector('.toast');
            if (existing) existing.remove();
            
            const toast = document.createElement('div');
            toast.className = 'toast' + (level !== 'info' ? ' toast-' + level : '');
            toast.textContent = message;
            toast.setAttribute('role', 'status');
            toast.setAttribute('aria-live', 'polite');
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), duration);
        }

        // ==================== 分享功能 ====================
        let shareQrcode = null;

        function getShareLink() {
            const roomCode = currentRoom || document.getElementById('displayRoomCode').textContent;
            let baseUrl = window.location.origin + window.location.pathname;
            baseUrl = baseUrl.replace(/\/index\.html$/, '/');
            if (!baseUrl.endsWith('/')) baseUrl += '/';
            return `${baseUrl}?room=${roomCode}`;
        }

        function openShareModal() {
            const roomCode = currentRoom || document.getElementById('displayRoomCode').textContent;
            const link = getShareLink();

            document.getElementById('shareLinkInput').value = link;

            const qrcodeContainer = document.getElementById('shareQrcode');
            qrcodeContainer.innerHTML = '';
            if (typeof QRCode !== 'undefined') {
                shareQrcode = new QRCode(qrcodeContainer, {
                    text: link,
                    width: 150,
                    height: 150,
                    colorDark: '#1a1a2e',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.M
                });
            }
            document.getElementById('shareModal').classList.add('active');
        }

        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('active');
        }

        function copyShareLink() {
            const link = getShareLink();
            const btn = document.getElementById('shareLinkBtn');
            navigator.clipboard.writeText(link).then(() => {
                btn.textContent = '已复制 ✓';
                btn.classList.add('copied');
                showToast('链接已复制');
                setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 2000);
            }).catch(() => showToast('复制失败'));
        }

        function copyShareText() {
            const roomCode = currentRoom || document.getElementById('displayRoomCode').textContent;
            const link = getShareLink();
            const text = `来玩五子棋！⚫⚪\n房间号：${roomCode}\n点击链接直接加入：${link}`;
            navigator.clipboard.writeText(text).then(() => {
                showToast('文案已复制');
                closeShareModal();
            }).catch(() => showToast('复制失败'));
        }

        let inviteRoomCode = null;

        function checkAutoJoin() {
            const params = new URLSearchParams(window.location.search);
            const roomCode = params.get('room');
            if (roomCode && roomCode.length >= 4) {
                window.history.replaceState({}, '', window.location.pathname);
                inviteRoomCode = roomCode.toUpperCase().trim();

                const savedNickname = localStorage.getItem('gomoku_nickname');
                const inviteInput = document.getElementById('inviteNicknameInput');
                if (savedNickname) inviteInput.value = savedNickname;

                document.getElementById('inviteRoomCode').textContent = inviteRoomCode;
                document.getElementById('inviteOverlay').classList.add('active');
            }
        }

        function confirmInviteJoin() {
            const input = document.getElementById('inviteNicknameInput');
            if (!input.value.trim()) {
                showToast('请先输入你的昵称', 2000, 'warning');
                input.focus();
                return;
            }
            username = input.value.trim();
            localStorage.setItem('gomoku_nickname', username);
            document.getElementById('usernameInput').value = username;
            document.getElementById('inviteOverlay').classList.remove('active');

            if (socket && socket.connected) {
                socket.emit('join_room', { roomCode: inviteRoomCode, username, avatar: myAvatarSrc });
            } else {
                showToast('正在连接服务器，请稍后再试...');
                document.getElementById('roomCodeInput').value = inviteRoomCode;
            }
            inviteRoomCode = null;
        }

        function cancelInviteJoin() {
            document.getElementById('inviteOverlay').classList.remove('active');
            inviteRoomCode = null;
        }

        // ==================== 聊天功能 ====================
        let chatUnread = 0;

        function toggleChat() {
            const panel = document.getElementById('chatPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                chatUnread = 0;
                updateChatBadge();
                const msgs = document.getElementById('chatMessages');
                msgs.scrollTop = msgs.scrollHeight;
            }
        }

        function updateChatBadge() {
            const badge = document.getElementById('chatBadge');
            if (chatUnread > 0) {
                badge.textContent = chatUnread > 9 ? '9+' : chatUnread;
                badge.classList.add('active');
            } else {
                badge.classList.remove('active');
            }
        }

        function sendChatMsg() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !socket || !socket.connected) return;
            socket.emit('chat_message', { text });
            input.value = '';
        }

        function sendQuick(text) {
            if (!socket || !socket.connected) return;
            socket.emit('chat_message', { text });
        }

        function appendChatMessage(data) {
            const msgs = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'chat-msg';
            const colorClass = data.color || '';
            div.innerHTML = `<span class="chat-sender ${colorClass}">${data.username}：</span><span class="chat-text">${escapeHtml(data.text)}</span>`;
            msgs.appendChild(div);
            msgs.scrollTop = msgs.scrollHeight;

            const panel = document.getElementById('chatPanel');
            if (!panel.classList.contains('active')) {
                chatUnread++;
                updateChatBadge();
            }
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // 初始化
        const savedName = localStorage.getItem('gomoku_nickname') || localStorage.getItem('mahjong_nickname');
        if (savedName) document.getElementById('usernameInput').value = savedName;
        document.getElementById('usernameInput').addEventListener('change', function() {
            if (this.value.trim()) localStorage.setItem('gomoku_nickname', this.value.trim());
        });

        const savedAvatar = localStorage.getItem('gomoku_avatar');
        if (savedAvatar) {
            myAvatarSrc = savedAvatar;
            document.querySelectorAll('.avatar-pick').forEach(btn => {
                const img = btn.querySelector('img');
                btn.classList.toggle('active', img && img.getAttribute('src') === savedAvatar);
            });
        }

        connectServer();
    </script>
</body>
</html>
