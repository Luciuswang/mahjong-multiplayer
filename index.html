    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        }

        /* еӨ§еҺ…з•Ңйқў */
        .lobby-title {

        /* иҜӯйҹійҖүжӢ©еҷ?*/
        .voice-selector {

        }

        /* жҲҝй—ҙз•Ңйқў */
        .room-header {

        .room-code-label {

        .copy-btn {

        .room-container {

        }

        .player-slot {

            border-radius: 15px;
            padding: 20px;
            text-align: center;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .player-slot.filled {

        }

        .player-slot.ready {
            border-color: var(--green);

        }

        .player-avatar {
            font-size: 2.5rem;
            margin-bottom: 8px;
            width: 64px;
            height: 64px;
            border-radius: 14px;
            overflow: hidden;
        }
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .player-name {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .player-wind {
            font-size: 0.9rem;
            color: var(--gold);
        }

        .player-status {
            font-size: 0.85rem;
            margin-top: 5px;
            padding: 3px 12px;
            border-radius: 10px;
        }

        .player-status.ready {
            background: var(--green);
            color: #fff;
        }

        .player-status.waiting {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        .player-status.host {
            background: var(--gold);
            color: #fff;
        }

        .empty-slot {
            color: rgba(255,255,255,0.5);
            font-size: 1rem;
        }

        .room-actions {
            display: flex;
            gap: 15px;
        }

        .room-actions .btn {
            flex: 1;
        }

        /* жёёжҲҸз•Ңйқў - з«–еұҸдјҳеҢ–еёғеұҖ */
        .game-screen {
            padding: 8px;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 620px;
            padding: 8px 15px;
            background: rgba(12, 8, 28, 0.5);
            border: 1px solid rgba(168, 85, 247, 0.08);
            border-radius: 10px;
            margin-bottom: 8px;
        }

        .game-info {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .game-info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }

        .game-info-icon {
            width: 26px;
            height: 26px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 0.75rem;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.25);
        }

        /* 3D йҖҸи§Ҷе®№еҷЁ */
        .table-perspective {
            perspective: 1200px;
            perspective-origin: 50% 85%;
            width: 100%;
            max-width: 620px;
        }

        /* йә»е°ҶжЎ?- 3D йҖҸи§ҶеёғеұҖ */
        .mahjong-table {
            background:
                radial-gradient(ellipse 120% 80% at 50% 40%, rgba(80, 40, 140, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at center, #141028 0%, #0e0a20 40%, #08061a 100%);
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 14px;
            box-shadow:
                inset 0 0 60px rgba(100, 50, 180, 0.06),
                inset 0 0 120px rgba(80, 30, 160, 0.03),
                0 0 25px rgba(168, 85, 247, 0.15),
                0 0 60px rgba(120, 50, 200, 0.08),
                0 0 100px rgba(168, 85, 247, 0.04),
                0 10px 40px rgba(0,0,0,0.7);
            width: 100%;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr;
            padding: 12px;
            gap: 6px;
            transform: rotateX(15deg);
            transform-style: preserve-3d;
            transform-origin: center bottom;
            position: relative;
        }

        .mahjong-table::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(168,85,247,0.4), rgba(249,115,22,0.2), rgba(168,85,247,0.3));
            z-index: -1;
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            -webkit-mask-composite: xor;
            padding: 2px;
        }

        .mahjong-table::after {
            content: '';
            position: absolute;
            inset: 8px;
            border-radius: 8px;
            border: 1px solid rgba(168, 85, 247, 0.06);
            pointer-events: none;
        }

        .table-row-middle {
            display: flex;
            gap: 4px;
            align-items: stretch;
        }

        /* еҜ№жүӢеҢәеҹҹ - жЁӘеҗ‘жҺ’еҲ—пјҢиЎҘеҒҝйҖҸи§ҶеҺӢзј© */
        .opponents-row {
            display: flex;
            justify-content: space-around;
            gap: 5px;
            transform: scaleY(1.08);
            transform-origin: center bottom;
        }

        /* зҺ©е®¶еҢәеҹҹ */
        .seat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5px;
            flex: 1;
            min-width: 0;
        }

        .seat-info {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }

        .seat-avatar {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            border: 2px solid rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 12px rgba(168, 85, 247, 0.2);
            overflow: hidden;
        }
        .seat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #seat-0 .seat-avatar { border-color: rgba(168, 85, 247, 0.6); }
        #seat-1 .seat-avatar { border-color: rgba(249, 115, 22, 0.5); background: linear-gradient(135deg, #c2410c, #f97316); }
        #seat-2 .seat-avatar { border-color: rgba(6, 182, 212, 0.5); background: linear-gradient(135deg, #0891b2, #06b6d4); }
        #seat-3 .seat-avatar { border-color: rgba(34, 197, 94, 0.5); background: linear-gradient(135deg, #16a34a, #22c55e); }

        .seat-avatar.current-turn {
            animation: pulse-neon 1.2s infinite;
            border-color: rgba(168, 85, 247, 0.8);
            box-shadow: 0 0 18px rgba(168, 85, 247, 0.5), 0 0 35px rgba(168, 85, 247, 0.2);
        }

        .seat-avatar.offline {
            filter: grayscale(100%);
            opacity: 0.5;
        }

        .seat-info.offline .seat-name::after {
            content: ' (зҰ»зәҝ)';
            color: #ff6b6b;
            font-size: 0.7rem;
        }

        @keyframes pulse-neon {
            0%, 100% { transform: scale(1); box-shadow: 0 0 18px rgba(168, 85, 247, 0.5); }
            50% { transform: scale(1.08); box-shadow: 0 0 28px rgba(168, 85, 247, 0.7), 0 0 50px rgba(168, 85, 247, 0.25); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .seat-name {
            font-size: 0.9rem;
            font-weight: bold;
            color: rgba(255,255,255,0.9);
        }

        .seat-wind {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            box-shadow: 0 0 8px rgba(168, 85, 247, 0.25);
        }

        .seat-tiles {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* дёӯеӨ®еҮәзүҢеҢәеҹҹ */
        .table-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            background: rgba(10, 5, 25, 0.6);
            border: 1px solid rgba(168, 85, 247, 0.1);
            border-radius: 10px;
            position: relative;
        }

        .table-center::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 70px; height: 70px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(168, 85, 247, 0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .discard-area {
            background: rgba(5, 3, 15, 0.4);
            border: 1px solid rgba(168, 85, 247, 0.1);
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 3px;
            justify-content: center;
            align-content: flex-start;
        }

        .last-discard-label {
            font-size: 0.85rem;
            color: rgba(200, 180, 255, 0.7);
        }

        /* жүӢзүҢеҢәеҹҹ - дёҚеҸ— 3D еҪұе“Қ */
        .my-hand-area {
            width: 100%;
            max-width: 620px;
            background: rgba(12, 8, 30, 0.8);
            border: 1px solid rgba(168, 85, 247, 0.15);
            border-radius: 14px;
            padding: 12px;
            margin-top: 8px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 -4px 20px rgba(168, 85, 247, 0.06);
        }

        .my-hand-label {
            font-size: 0.85rem;
            color: var(--gold);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .my-hand {
            display: flex;
            gap: 3px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .my-melds {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .meld-group {
            display: flex;
            gap: 2px;
            background: rgba(10, 5, 25, 0.5);
            border: 1px solid rgba(168, 85, 247, 0.08);
            padding: 4px;
            border-radius: 5px;
        }

        /* йә»е°ҶзүҢж ·еј?- 3D з«ӢдҪ“ */
        .tile {
            width: 45px;
            height: 63px;
            background-color: #eef0f5;
            background-image: url('img/majiang.png');
            background-repeat: no-repeat;
            border: 1px solid rgba(160, 150, 180, 0.5);
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            box-shadow:
                1px 2px 0 0 #d0cee0,
                2px 4px 0 0 #a8a4be,
                3px 6px 0 0 #8a85a0,
                0 8px 16px rgba(0,0,0,0.45);
            position: relative;
            user-select: none;
        }

        .tile::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 1px;
            right: 1px;
            height: 5px;
            background: linear-gradient(180deg, #b8b5cc, #908ca6);
            border-radius: 0 0 3px 3px;
            pointer-events: none;
        }

        /* зүҢйқўеҠ иҪҪдёӯзҠ¶жҖ?*/
        .tile.loading {
            background-image: none;
            background: linear-gradient(135deg, #dde0ea 25%, #f0f2f8 50%, #dde0ea 75%);
            background-size: 200% 100%;
            animation: tileLoading 1s ease-in-out infinite;
        }

        @keyframes tileLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        body.sprites-loaded .tile.loading {
            animation: none;
            background: #eef0f5;
        }

        .tile:hover {
            transform: translateY(-8px);
            box-shadow:
                1px 2px 0 0 #d0cee0,
                2px 4px 0 0 #a8a4be,
                3px 6px 0 0 #8a85a0,
                0 14px 24px rgba(0,0,0,0.5);
        }

        .tile.selected {
            transform: translateY(-12px);
            border-color: rgba(168, 85, 247, 0.7);
            box-shadow:
                0 0 12px rgba(168, 85, 247, 0.5),
                0 0 25px rgba(168, 85, 247, 0.2),
                1px 2px 0 0 #d0cee0;
        }

        /* еҲҡж‘ёзҡ„зүҢ - зӘҒеҮәжҳҫзӨә */
        .tile.new-tile {

        /* ==================== жҖ§иғҪдјҳеҢ–ж ·ејҸ ==================== */
        
        /* ејұзҪ‘/дҪҺз«Ҝи®ҫеӨҮжЁЎејҸ - еҮҸе°‘еҠЁз”» */
        body.reduce-motion *,
        body.reduce-motion *::before,
        body.reduce-motion *::after {
            animation-duration: 0.01ms !important;
            animation-iteration-count: 1 !important;
            transition-duration: 0.01ms !important;
        }
        
        body.reduce-motion .tile:hover {
            transform: none;
        }
        
        body.reduce-motion .tile.new-tile {
            animation: none;
            box-shadow: 0 0 10px rgba(168,85,247,0.9);

        body.reduce-motion .seat-avatar.current-turn {
            animation: none;
            box-shadow: 0 0 10px var(--gold);
        }
        
        /* зҪ‘з»ңзҠ¶жҖҒжҢҮзӨәеҷЁ */

            top: 10px;
            right: 10px;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            z-index: 1000;
            display: none;
        }
        
        .network-indicator.slow {
            display: block;
            background: rgba(231, 76, 60, 0.9);
            color: white;
        }
        
        .network-indicator.medium {
            display: block;
            background: rgba(241, 196, 15, 0.9);

        }

        /* иҝһжҺҘзҠ¶жҖҒжҢҮзӨәзҒҜ */
        .conn-status {

            top: 12px;
            right: 12px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            z-index: 999;

        }
        .conn-status.reconnecting {
            background: #f59e0b;
            box-shadow: 0 0 6px #f59e0b;
            animation: connBlink 1s infinite;
        }
        .conn-status.disconnected {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }
        @keyframes connBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        /* GPU еҠ йҖҹдјҳеҢ?*/
        .tile, .seat-avatar, .modal-content {
            will-change: transform;
            transform: translateZ(0);
        }
        
        /* дҪҺз«Ҝи®ҫеӨҮйўқеӨ–дјҳеҢ– */
        @media (max-width: 480px) {
            .tile {
                will-change: auto;
            }
        }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ==================== UI/UX ж”№иҝӣ - еҠЁз”»ж•Ҳжһң ==================== */
        
        /* еҮәзүҢйЈһиЎҢеҠЁз”» */
        @keyframes discardFly {
            0% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
            50% {
                transform: scale(0.8) translateY(-100px);
                opacity: 0.8;
            }
            100% {
                transform: scale(0.6) translateY(-200px);
                opacity: 0;
            }
        }
        
        .tile.discarding {
            animation: discardFly 0.5s ease-out forwards;
            pointer-events: none;
        }
        
        /* ж‘ёзүҢж»‘е…ҘеҠЁз”» */
        @keyframes drawSlide {
            0% {
                transform: translateX(100px) scale(0.5);
                opacity: 0;
            }
            60% {
                transform: translateX(-10px) scale(1.1);
            }
            100% {
                transform: translateX(0) scale(1);
                opacity: 1;
            }
        }
        
        .tile.drawing {
            animation: drawSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        
        /* зў?жқ?иғ?еҠЁдҪңзү№ж•Ҳ */
        .action-effect {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 8000;
            pointer-events: none;
        }
        
        .action-effect-text {
            font-family: 'Ma Shan Zheng', cursive;
            font-size: 120px;
            font-weight: bold;
            text-shadow: 0 0 30px currentColor, 0 0 60px currentColor;
            animation: actionPop 1s ease-out forwards;
        }
        
        .action-effect-text.peng {
            color: #60a5fa;
        }
        
        .action-effect-text.gang {
            color: #a78bfa;
        }
        
        .action-effect-text.hu, .action-effect-text.zimo {
            color: #FFD700;
            animation: actionPop 1.5s ease-out forwards, huGlow 0.5s ease-in-out infinite;
        }
        
        @keyframes actionPop {
            0% {
                transform: scale(0) rotate(-10deg);
                opacity: 0;
            }
            30% {
                transform: scale(1.3) rotate(5deg);
                opacity: 1;
            }
            50% {
                transform: scale(1) rotate(-2deg);
            }
            100% {
                transform: scale(1.1) rotate(0deg);
                opacity: 0;
            }
        }
        
        @keyframes huGlow {
            0%, 100% {
                text-shadow: 0 0 30px #FFD700, 0 0 60px #FFD700, 0 0 90px #FF8C00;
            }
            50% {
                text-shadow: 0 0 50px #FFD700, 0 0 100px #FFD700, 0 0 150px #FF8C00;
            }
        }
        
        /* зғҹиҠұе®№еҷЁ */
        .fireworks-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 7500;
            overflow: hidden;
        }
        
        /* еҚ•дёӘзғҹиҠұ */
        .firework {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: fireworkExplode 1.5s ease-out forwards;
        }
        
        @keyframes fireworkExplode {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }
        
        /* зғҹиҠұзІ’еӯҗ */
        .firework-particle {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            animation: particleFly 1.2s ease-out forwards;
        }
        
        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0);
            }

    <script>
        // ==================== жҖ§иғҪдјҳеҢ–е·Ҙе…· ====================
        
        // иҠӮжөҒеҮҪж•° - йҷҗеҲ¶еҮҪж•°и°ғз”Ёйў‘зҺҮ
        function throttle(func, limit) {
            let inThrottle;
            let lastResult;
            return function(...args) {
                if (!inThrottle) {
                    lastResult = func.apply(this, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
                return lastResult;
            };
        }
        
        // йҳІжҠ–еҮҪж•° - е»¶иҝҹжү§иЎҢзӣҙеҲ°еҒңжӯўи°ғз”Ё
        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }
        
        // requestAnimationFrame е°ҒиЈ…
        let rafPending = false;
        let rafCallback = null;
        function scheduleUpdate(callback) {
            rafCallback = callback;
            if (!rafPending) {
                rafPending = true;
                requestAnimationFrame(() => {
                    rafPending = false;
                    if (rafCallback) rafCallback();
                });
            }
        }
        
        // зҪ‘з»ңзҠ¶жҖҒжЈҖжө?
        let networkQuality = 'good'; // 'good', 'slow', 'offline'
        let lastPingTime = 0;
        let pingHistory = [];
        
        function updateNetworkQuality(ping) {
            pingHistory.push(ping);
            if (pingHistory.length > 5) pingHistory.shift();
            
            const avgPing = pingHistory.reduce((a, b) => a + b, 0) / pingHistory.length;
            
            if (avgPing > 500) {
                networkQuality = 'slow';
            } else if (avgPing > 200) {
                networkQuality = 'medium';
            } else {
                networkQuality = 'good';
            }
            
            // ејұзҪ‘ж—¶еҮҸе°‘еҠЁз”?
            document.body.classList.toggle('reduce-motion', networkQuality === 'slow');
        }
        
        // дҪҺжҖ§иғҪи®ҫеӨҮжЈҖжө?
        const isLowEndDevice = (function() {
            // жЈҖжөӢи®ҫеӨҮеҶ…еӯ?(еҰӮжһңеҸҜз”Ё)
            const memory = navigator.deviceMemory;
            if (memory && memory < 4) return true;
            
            // жЈҖжөӢжҳҜеҗҰжҳҜз§»еҠЁи®ҫеӨҮ
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            
            // жЈҖжөӢзЎ¬д»¶е№¶еҸ‘ж•°
            const cores = navigator.hardwareConcurrency;
            if (cores && cores < 4) return true;
            
            return isMobile;
        })();
        
        // дҪҺз«Ҝи®ҫеӨҮиҮӘеҠЁеҗҜз”ЁзңҒз”өжЁЎејҸ
        let performanceMode = isLowEndDevice ? 'low' : 'high';
        
        // DOM е…ғзҙ зј“еӯҳ
        const domCache = {};
        function $(id) {
            if (!domCache[id]) {
                domCache[id] = document.getElementById(id);
            }
            return domCache[id];
        }
        
        // дёҠдёҖж¬ЎжёёжҲҸзҠ¶жҖҒпјҲз”ЁдәҺеўһйҮҸжӣҙж–°пј?
        let prevGameState = null;
        
        // жёёжҲҸзҠ¶жҖ?
        let socket = null;
        let currentRoom = null;
        // д»?localStorage жҒўеӨҚжҲҝй—ҙеҸ·пјҲ2е°Ҹж—¶еҶ…жңүж•Ҳпјү
        try {
            const saved = JSON.parse(localStorage.getItem('mj_room_session') || 'null');
            if (saved && saved.room && Date.now() - saved.ts < 7200000) {
                currentRoom = saved.room;
            } else {
                localStorage.removeItem('mj_room_session');
            }
        } catch(e) { localStorage.removeItem('mj_room_session'); }
        let myPlayerId = null;
        let mySeatIndex = -1;
        let selectedTileId = null;
        let gameState = null;
        let isReady = false;
        let username = '';
        let lastDrawnTileId = null; // и®°еҪ•еҲҡж‘ёзҡ„зүҢ
        let pendingAutoDiscard = false; // жҳҜеҗҰзӯүеҫ…иҮӘеҠЁеҮәзүҢ
        let pendingAutoDiscardTileId = null; // зӯүеҫ…иҮӘеҠЁеҮәзүҢзҡ„зүҢID

        // ==================== з»“жқҹеҘҪеҸӢзі»з»ҹеҸҳйҮҸ ====================

        // зүҢйқўжҳҫзӨә
        const TYPE_NAMES = { wan: 'дё?, tiao: 'жқ?, tong: 'зӯ?, honor: '', flower: 'иҠ? };
        const NUM_NAMES = ['', 'дёҖ', 'дә?, 'дё?, 'еӣ?, 'дә?, 'е…?, 'дё?, 'е…?, 'д№?];
        const HONOR_NAMES_MP = {
            dong: 'дё?, nan: 'еҚ?, xi: 'иҘ?, bei: 'еҢ?,
            zhong: 'зәўдёӯ', fa: 'еҸ‘иҙў', bai: 'зҷҪжқҝ'
        };
        const FLOWER_NAMES_MP = {
            chun: 'жҳ?, xia: 'еӨ?, qiu: 'з§?, dong_hua: 'еҶ?,
            mei: 'жў?, lan: 'е…?, zhu: 'з«?, ju: 'иҸ?
        };
        const WIND_NAMES = { east: 'дё?, south: 'еҚ?, west: 'иҘ?, north: 'еҢ? };
        
        // зІҫзҒөеӣҫдҪҚзҪ®жҳ е°?(8еҲ—Г?иЎҢзҪ‘ж ?
        const TILE_SPRITE_MAP = {
            // з¬?иЎ? дёҮеӯҗ 1-8
            'wan1': [0, 0], 'wan2': [0, 1], 'wan3': [0, 2], 'wan4': [0, 3],
            'wan5': [0, 4], 'wan6': [0, 5], 'wan7': [0, 6], 'wan8': [0, 7],
            
            // з¬?иЎ? зӯ’еӯҗ 1-8
            'tong1': [1, 0], 'tong2': [1, 1], 'tong3': [1, 2], 'tong4': [1, 3],
            'tong5': [1, 4], 'tong6': [1, 5], 'tong7': [1, 6], 'tong8': [1, 7],
            
            // з¬?иЎ? жқЎеӯҗ 1-8
            'tiao1': [2, 0], 'tiao2': [2, 1], 'tiao3': [2, 2], 'tiao4': [2, 3],
            'tiao5': [2, 4], 'tiao6': [2, 5], 'tiao7': [2, 6], 'tiao8': [2, 7],
            
            // з¬?иЎ? еӯ—зүҢ дёңеҚ—иҘҝеҢ—дёӯеҸ‘зҷ?
            'dong': [3, 0], 'nan': [3, 1], 'xi': [3, 2], 'bei': [3, 3],
            'zhong': [3, 4], 'fa': [3, 5], 'bai': [3, 6],
            
            // з¬?иЎ? иҠұзүҢ
            'qiu': [4, 0], 'lan': [4, 1], 'zhu': [4, 2], 'mei': [4, 3],
            'chun': [4, 4], 'xia': [4, 5], 'dong_hua': [4, 6], 'ju': [4, 7],
            
            // з¬?иЎ? 9дё?9зӯ?9жқ?
            'wan9': [5, 0], 'tong9': [5, 1], 'tiao9': [5, 2]
        };
        
        // иҺ·еҸ–зІҫзҒөеӣҫиғҢжҷҜдҪҚзҪ®пјҲдёҮжқЎзӯ’пјҡtype+ж•°еӯ—пјӣеӯ—зү?иҠұзүҢпјҡдёҺйӣӘзў§еӣҫй”®дёҖиҮҙпјү
        function getSpritePosition(tile) {
            let key;
            if (tile.type === 'flower') key = tile.value;
            else if (tile.type === 'honor') key = tile.value;
            else key = `${tile.type}${tile.value}`;
            const pos = TILE_SPRITE_MAP[key];
            
            if (!pos) return '';
            
            const cols = 8;
            const rows = 6;
            
            // дҪҝз”ЁзҷҫеҲҶжҜ”е®ҡдҪ?
            const posX = pos[1] === 0 ? 0 : (pos[1] / (cols - 1)) * 100;
            const posY = pos[0] === 0 ? 0 : (pos[0] / (rows - 1)) * 100;
            
            return `background-size: ${cols * 100}% ${rows * 100}%; background-position: ${posX}% ${posY}%;`;
        }
        
        // ==================== еҗ¬зүҢжЈҖжөӢпјҲдё?server.js е“ҲзҒөи§„еҲҷдёҖиҮҙпјү====================
        let isTing = false;
        let tingList = [];
        
        function isNumberTileMp(tile) {
            return tile && ['wan', 'tiao', 'tong'].includes(tile.type);
        }
        function tileKeyMp(tile) {
            if (!tile) return '';
            if (isNumberTileMp(tile)) return `${tile.type}_${tile.value}`;
            if (tile.type === 'honor') return tile.value;
            return `${tile.type}_${tile.value}`;
        }
        function sortTilesMp(tiles) {
            const typeOrder = { wan: 0, tiao: 1, tong: 2, honor: 3, flower: 4 };
            const honorOrder = { dong: 0, nan: 1, xi: 2, bei: 3, zhong: 4, fa: 5, bai: 6 };
            return [...tiles].sort((a, b) => {
                const oa = typeOrder[a.type] ?? 99;
                const ob = typeOrder[b.type] ?? 99;
                if (oa !== ob) return oa - ob;
                if (a.type === 'honor' && b.type === 'honor')
                    return (honorOrder[a.value] ?? 99) - (honorOrder[b.value] ?? 99);
                return (a.value || 0) - (b.value || 0);
            });
        }
        function isQiDuiMp(tiles) {
            if (!tiles || tiles.length !== 14) return false;
            const counts = {};
            tiles.forEach(t => {
                const k = tileKeyMp(t);
                counts[k] = (counts[k] || 0) + 1;
            });
            return Object.keys(counts).length === 7 && Object.values(counts).every(v => v === 2);
        }
        function isShiSanYaoMp(tiles) {
            if (!tiles || tiles.length !== 14) return false;
            const ORPHAN_KEYS = new Set([
                'wan_1', 'wan_9', 'tiao_1', 'tiao_9', 'tong_1', 'tong_9',
                'dong', 'nan', 'xi', 'bei', 'zhong', 'fa', 'bai'
            ]);
            const counts = {};
            for (const t of tiles) {
                const k = tileKeyMp(t);
                if (!ORPHAN_KEYS.has(k)) return false;
                counts[k] = (counts[k] || 0) + 1;
            }
            if (Object.keys(counts).length !== 13) return false;
            let pairCount = 0;
            for (const k of Object.keys(counts)) {
                const c = counts[k];
                if (c !== 1 && c !== 2) return false;
                if (c === 2) pairCount++;
            }
            return pairCount === 1;
        }
        
        function canHuHand(tiles, meldCount = 0) {
            const total = tiles.length + meldCount * 3;
            if (total !== 14) return false;
            if (meldCount === 0) {
                if (isQiDuiMp(tiles)) return true;
                if (isShiSanYaoMp(tiles)) return true;
            }
            if (tiles.length === 0) return true;
            if (tiles.length === 2) {
                return tiles[0].type === tiles[1].type && tiles[0].value === tiles[1].value;
            }
            if (tiles.length < 3) return false;
            
            const sorted = sortTilesMp(tiles);
            
            for (let i = 0; i < sorted.length - 1; i++) {
                if (sorted[i].type === sorted[i + 1].type && sorted[i].value === sorted[i + 1].value) {
                    const remaining = [...sorted];
                    remaining.splice(i, 2);
                    if (canFormMelds(remaining)) return true;
                }
            }
            return false;
        }
        
        function canFormMelds(tiles) {
            if (tiles.length === 0) return true;
            if (tiles.length % 3 !== 0) return false;
            
            const sorted = sortTilesMp(tiles);
            
            if (sorted.length >= 3 &&
                sorted[0].type === sorted[1].type && sorted[1].type === sorted[2].type &&
                sorted[0].value === sorted[1].value && sorted[1].value === sorted[2].value) {
                return canFormMelds(sorted.slice(3));
            }
            
            if (sorted.length >= 3) {
                const first = sorted[0];
                if (isNumberTileMp(first)) {
                    const secondIdx = sorted.findIndex(t => t.type === first.type && t.value === first.value + 1);
                    const thirdIdx = sorted.findIndex(t => t.type === first.type && t.value === first.value + 2);
                    if (secondIdx !== -1 && thirdIdx !== -1) {
                        const remaining = [...sorted];
                        [thirdIdx, secondIdx, 0].sort((a, b) => b - a).forEach(idx => remaining.splice(idx, 1));
                        if (canFormMelds(remaining)) return true;
                    }
                }
            }
            return false;
        }
        
        function allTilesForTing() {
            const list = [];
            for (const type of ['wan', 'tiao', 'tong']) {
                for (let value = 1; value <= 9; value++) list.push({ type, value });
            }
            for (const h of ['dong', 'nan', 'xi', 'bei', 'zhong', 'fa', 'bai']) {
                list.push({ type: 'honor', value: h });
            }
            return list;
        }
        
        function formatTileNameMp(tile) {
            if (!tile) return '';
            if (isNumberTileMp(tile)) return NUM_NAMES[tile.value] + TYPE_NAMES[tile.type];
            if (tile.type === 'honor') return HONOR_NAMES_MP[tile.value] || tile.value;
            if (tile.type === 'flower') return FLOWER_NAMES_MP[tile.value] || tile.value;
            return String(tile.value);
        }
        
        function checkTingPai(hand, meldCount = 0) {
            const tingTiles = [];
            for (const testTile of allTilesForTing()) {
                const testHand = [...hand, testTile];
                if (canHuHand(testHand, meldCount)) tingTiles.push(testTile);
            }
            return tingTiles;
        }
        
        // е·ІжҳҫзӨәиҝҮеҗ¬зүҢйҖүжӢ©зҡ„ж Үи®°пјҲйҒҝе…ҚйҮҚеӨҚеј№еҮәпј?
        let tingChoiceShown = false;
        let pendingTingList = [];
        
        // жЈҖжҹҘе№¶жҳҫзӨәеҗ¬зүҢзҠ¶жҖ?
        function checkAndShowTing() {
            if (!gameState) return;
            if (isTing) return; // е·Із»Ҹеҗ¬зүҢдә?
            if (tingChoiceShown) return; // е·Із»ҸжҳҫзӨәиҝҮйҖүжӢ©дә?
            
            const myPlayer = gameState.players.find(p => p.seatIndex === mySeatIndex);
            if (!myPlayer || !myPlayer.hand) return;
            
            // еҸӘжңү13еј зүҢж—¶жЈҖжөӢеҗ¬зүҢпјҲжҲ?0еј жңү1зў°пјҢ7еј жңү2зў?..пј?
            const expectedSize = 13 - (myPlayer.melds?.length || 0) * 3;
            if (myPlayer.hand.length !== expectedSize) return;
            
            const meldN = myPlayer.melds?.length || 0;
            const newTingList = checkTingPai(myPlayer.hand, meldN);
            
            if (newTingList.length > 0) {
                // дҝқеӯҳеҫ…йҖүеҗ¬зүҢеҲ—иЎ?
                pendingTingList = newTingList;
                tingChoiceShown = true;
                
                // жҳҫзӨәеҗ¬зүҢйҖүжӢ©еҜ№иҜқжЎ?
                showTingChoiceModal(newTingList);
            }
        }
        
        // жҳҫзӨәеҗ¬зүҢйҖүжӢ©еҜ№иҜқжЎ?
        function showTingChoiceModal(tingTiles) {
            const tingNames = tingTiles.map(t => formatTileNameMp(t)).join('гҖ?);
            document.getElementById('tingTilesInfo').innerHTML = `
                <div style="margin-bottom:10px;">еҗ¬пјҡ<strong style="color:var(--gold)">${tingNames}</strong></div>
                <div style="font-size:0.9rem;color:rgba(255,255,255,0.7);">е…?${tingTiles.length} еј?/div>

        }
        
        // зЎ®и®Өеҗ¬зүҢ
        function confirmTing() {
            isTing = true;
            tingList = pendingTingList;
            
            // йҖҡзҹҘжңҚеҠЎеҷЁзЎ®и®Өеҗ¬зү?
            if (socket) {
                socket.emit('confirm_ting', { tingList: tingList });
                console.log('йҖҡзҹҘжңҚеҠЎеҷЁзЎ®и®Өеҗ¬зү?);
            }
            
            // иҜӯйҹіж’ӯжҠҘ
            speakTing();
            
            // е…ій—ӯеҜ№иҜқжЎ?
            document.getElementById('tingChoiceModal').classList.remove('active');
            
            const tingNames = tingList.map(t => formatTileNameMp(t)).join('гҖ?);

            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = type;
                oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);

        // ж’ӯж”ҫзҲҶзӮёйҹіж•ҲпјҲж”ҫзӮ®ж—¶пј?
        function playExplosionSound() {
            try {
                if (!audioContext) {
                    audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContext.state === 'suspended') audioContext.resume();
                
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(150, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(40, audioContext.currentTime + 0.3);
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.4);
            } catch (e) {
                console.log('йҹіж•Ҳж’ӯж”ҫеӨұиҙҘ:', e);
                vibrate(200);
            }
        }

        // еҗҜеҠЁ Ping зӣ‘жҺ§
        function startPingMonitor() {

            pingInterval = setInterval(() => {
                if (socket && socket.connected) {

        function updateConnStatus(state) {
            const dot = document.getElementById('connStatus');
            if (!dot) return;
            dot.className = 'conn-status';
            if (state === 'reconnecting') { dot.classList.add('reconnecting'); dot.title = 'йҮҚиҝһдё?..'; }
            else if (state === 'disconnected') { dot.classList.add('disconnected'); dot.title = 'е·Іж–ӯејҖ'; }
            else { dot.title = 'е·ІиҝһжҺ?; }
        }

        // жӣҙж–°зҪ‘з»ңжҢҮзӨәеҷ?
        function updateNetworkIndicator(quality) {
            const indicator = $('networkIndicator') || document.getElementById('networkIndicator');
            const status = $('networkStatus') || document.getElementById('networkStatus');
            
            if (!indicator) return;
            
            indicator.className = 'network-indicator';
            
            switch (quality) {
                case 'slow':
                    indicator.classList.add('slow');
                    status.textContent = 'вҡ пёҸ зҪ‘з»ңиҫғж…ў';
                    document.body.classList.add('reduce-motion');
                    break;
                case 'medium':
                    indicator.classList.add('medium');
                    status.textContent = 'рҹ“¶ зҪ‘з»ңдёҖиҲ?;
                    break;
                default:
                    // good - йҡҗи—ҸжҢҮзӨәеҷ?
                    document.body.classList.remove('reduce-motion');
                    break;
            }
        }

                    networkQuality = 'slow';
                    updateNetworkIndicator('slow');
                    showToast('вҡ пёҸ жЈҖжөӢеҲ°ејұзҪ‘зҺҜеўғпјҢе·ІеҗҜз”ЁзңҒжөҒжЁЎејҸ');

        // еӨҚеҲ¶жҲҝй—ҙеҸ?
        function copyRoomCode() {
            const roomCode = currentRoom || document.getElementById('displayRoomCode').textContent;
            
            // е°қиҜ•дҪҝз”ЁзҺ°д»Ј API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(roomCode).then(() => {
                    showToast('жҲҝй—ҙеҸ·е·ІеӨҚеҲ¶: ' + roomCode);
                }).catch(() => {
                    // еӨұиҙҘж—¶дҪҝз”ЁеӨҮз”Ёж–№жЎ?
                    fallbackCopy(roomCode);
                });
            } else {
                // дёҚж”ҜжҢ?clipboard APIпјҢдҪҝз”ЁеӨҮз”Ёж–№жЎ?
                fallbackCopy(roomCode);
            }
        }
        
        // еӨҮз”ЁеӨҚеҲ¶ж–№жі•пјҲе…је®?HTTPпј?
        function fallbackCopy(text) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                showToast('жҲҝй—ҙеҸ·е·ІеӨҚеҲ¶: ' + text);
            } catch (err) {
                showToast('еӨҚеҲ¶еӨұиҙҘпјҢиҜ·жүӢеҠЁеӨҚеҲ¶: ' + text);
            }
            
            document.body.removeChild(textArea);
        }

            return `${baseUrl}?room=${roomCode}`;

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(link).then(() => {

        function fallbackCopyWithCallback(text, btn) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-9999px';
            textArea.style.top = '-9999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            
            try {
                document.execCommand('copy');
                if (btn) {
                    btn.textContent = 'е·ІеӨҚеҲ?вң?;
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = 'еӨҚеҲ¶';
                        btn.classList.remove('copied');
                    }, 2000);
                }
                showToast('й“ҫжҺҘе·ІеӨҚеҲ?);

            }
            
            document.body.removeChild(textArea);
        }

        // жӣҙж–°жёёжҲҸUI - дјҳеҢ–зүҲпјҲеўһйҮҸжӣҙж–° + RAFпј?
        function updateGameUI() {
            if (!gameState) return;
            
            // дҪҝз”Ё requestAnimationFrame жү№йҮҸжӣҙж–°
            scheduleUpdate(() => {
                _doUpdateGameUI();
            });
        }
        
        function _doUpdateGameUI() {
            if (!gameState) return;
            
            const prev = prevGameState;
            
            // жӣҙж–°еү©дҪҷзүҢж•°пјҲеҸӘеңЁеҸҳеҢ–ж—¶жӣҙж–°пј?
            if (!prev || prev.deckRemaining !== gameState.deckRemaining) {
                $('deckCount').textContent = gameState.deckRemaining;
                const centerEl = $('centerDeckCount');
                if (centerEl) centerEl.textContent = gameState.deckRemaining;
            }

            // жӣҙж–°еҪ“еүҚеӣһеҗҲжҸҗзӨә
            if (!prev || prev.currentPlayerIndex !== gameState.currentPlayerIndex) {
                const currentPlayer = gameState.players[gameState.currentPlayerIndex];
                const isMyTurn = gameState.currentPlayerIndex === mySeatIndex;
                $('currentTurnText').textContent = 
                    isMyTurn ? 'иҪ®еҲ°дҪ дәҶпј? : `${currentPlayer?.username || ''}зҡ„еӣһеҗҲ`;
                $('currentWindIcon').textContent = 
                    WIND_NAMES[currentPlayer?.wind] || '';
            }

            // жӣҙж–°еҗ„дёӘеә§дҪҚпјҲеҸӘжӣҙж–°еҸҳеҢ–зҡ„еә§дҪҚпјү
            gameState.players.forEach((player, idx) => {
                const displaySeat = getDisplaySeat(player.seatIndex);
                const prevPlayer = prev?.players?.[idx];
                
                // жЈҖжҹҘжҳҜеҗҰйңҖиҰҒжӣҙж–?
                const needUpdate = !prevPlayer ||
                    prevPlayer.handCount !== player.handCount ||
                    prevPlayer.offline !== player.offline ||
                    gameState.currentPlayerIndex !== prev?.currentPlayerIndex;
                    
                if (needUpdate) {
                    updateSeatUI(displaySeat, player);
                }
                
                // жӣҙж–°иҠұзүҢжҳҫзӨә
                const prevFlowerCount = prevPlayer?.flowers?.length || 0;
                const flowerCount = player.flowers ? player.flowers.length : 0;
                if (prevFlowerCount !== flowerCount) {
                    const flowerEl = $(`flower-${displaySeat}`);
                    if (flowerEl) {
                        flowerEl.textContent = `рҹҢё${flowerCount}`;
                    }
                }
            });

            // жӣҙж–°жҲ‘зҡ„жүӢзүҢпјҲеҸӘеңЁжүӢзүҢеҸҳеҢ–ж—¶е®Ңе…ЁйҮҚз»ҳпј?
            const myPlayer = gameState.players.find(p => p.seatIndex === mySeatIndex);
            const prevMyPlayer = prev?.players?.find(p => p.seatIndex === mySeatIndex);
            
            if (myPlayer && myPlayer.hand) {
                const handChanged = !prevMyPlayer || 
                    !prevMyPlayer.hand ||
                    myPlayer.hand.length !== prevMyPlayer.hand.length ||
                    myPlayer.hand.some((t, i) => t.id !== prevMyPlayer.hand[i]?.id);
                    
                if (handChanged) {
                    renderMyHand(myPlayer.hand);
                }
                
                const meldsChanged = !prevMyPlayer ||
                    myPlayer.melds.length !== prevMyPlayer.melds?.length;
                    
                if (meldsChanged) {
                    renderMyMelds(myPlayer.melds);
                }
            }

            // жӣҙж–°еҮәзүҢеҢәпјҲеҸӘеңЁжңүж–°ејғзүҢж—¶жӣҙж–°пјү
            const discardsChanged = gameState.players.some((p, i) => {
                const prevP = prev?.players?.[i];
                return !prevP || p.discards.length !== prevP.discards.length;
            });
            
            if (discardsChanged) {
                updateDiscardArea();
            }

            // жӣҙж–°жҢүй’®зҠ¶жҖ?
            updateActionButtons();
            
            // дҝқеӯҳеҪ“еүҚзҠ¶жҖҒз”ЁдәҺдёӢж¬ЎжҜ”иҫ?
            prevGameState = JSON.parse(JSON.stringify(gameState));
        }

        // иҺ·еҸ–жҳҫзӨәеә§дҪҚпјҲзӣёеҜ№дәҺиҮӘе·ұзҡ„дҪҚзҪ®пјү
        function getDisplaySeat(seatIndex) {
            // е°Ҷз»қеҜ№еә§дҪҚиҪ¬жҚўдёәзӣёеҜ№дҪҚзҪ®пј?=иҮӘе·ұ, 1=еҸіе®¶, 2=еҜ№е®¶, 3=е·Ұе®¶
            return (seatIndex - mySeatIndex + 4) % 4;
        }

        // жӣҙж–°еә§дҪҚUI
        function updateSeatUI(displaySeat, player) {
            if (displaySeat === 0) return; // иҮӘе·ұзҡ„еә§дҪҚеҚ•зӢ¬еӨ„зҗ?

            const prefix = displaySeat === 1 ? 'seat-1' : displaySeat === 2 ? 'seat-2' : 'seat-3';
            
            const avatarEl = document.getElementById(`avatar-${displaySeat}`);
            avatarEl.innerHTML = avatarHTML(player.avatar, 46);
            avatarEl.classList.toggle('current-turn', gameState.currentPlayerIndex === player.seatIndex);
            avatarEl.classList.toggle('offline', player.offline === true);  // гҖҗж–°еўһгҖ‘зҰ»зәҝж ·еј?
            
            document.getElementById(`name-${displaySeat}`).textContent = player.username;
            document.getElementById(`wind-${displaySeat}`).textContent = player.windName;
            
            // гҖҗж–°еўһгҖ‘еә§дҪҚдҝЎжҒҜзҰ»зәҝж ·еј?
            const seatInfo = avatarEl.closest('.seat-info') || avatarEl.parentElement;
            if (seatInfo) {
                seatInfo.classList.toggle('offline', player.offline === true);
            }

            // жҳҫзӨәжүӢзүҢж•°йҮҸпјҲиғҢйқўпјү
            const tilesDiv = document.getElementById(`tiles-${displaySeat}`);
            tilesDiv.innerHTML = '';
            for (let i = 0; i < player.handCount; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile small back';
                tilesDiv.appendChild(tile);
            }
        }

        // жёІжҹ“жҲ‘зҡ„жүӢзүҢ - дјҳеҢ–зүҲпјҲдҪҝз”Ё DocumentFragmentпј?
        function renderMyHand(hand) {
            const container = $('myHand') || document.getElementById('myHand');
            
            // дҪҝз”Ё DocumentFragment жү№йҮҸжһ„е»ә DOM
            const fragment = document.createDocumentFragment();
            
            hand.forEach((tile, index) => {
                const isNewTile = (tile.id === lastDrawnTileId);
                const tileEl = createTileElement(tile, { isNew: isNewTile });
                
                // дҪҝз”ЁдәӢд»¶е§”жүҳжҸҗеҚҮжҖ§иғҪ
                tileEl.dataset.tileId = tile.id;
                if (tile.id === selectedTileId) {
                    tileEl.classList.add('selected');
                }
                fragment.appendChild(tileEl);
            });
            
            // дёҖж¬ЎжҖ§жӣҝжҚўжүҖжңүеҶ…е®?
            container.innerHTML = '';
            container.appendChild(fragment);
        }
        
        // жүӢзүҢеҢәеҹҹзӮ№еҮ»дәӢд»¶е§”жүҳпјҲеҮҸе°‘дәӢд»¶зӣ‘еҗ¬еҷЁж•°йҮҸпј?
        document.addEventListener('DOMContentLoaded', () => {
            const handContainer = document.getElementById('myHand');
            if (handContainer) {
                handContainer.addEventListener('click', (e) => {
                    const tileEl = e.target.closest('.tile');
                    if (tileEl && tileEl.dataset.tileId) {
                        selectTile(tileEl.dataset.tileId);
                    }
                });
            }
        });

        // еҲӣе»әйә»е°ҶзүҢе…ғзҙ?
        function createTileElement(tile, options = {}) {
            const { small = false, isNew = false, discarded = false } = options;
            const el = document.createElement('div');
            
            let classes = ['tile', tile.type];
            if (small) classes.push('small');
            if (discarded) classes.push('discarded');
            if (isNew) classes.push('new-tile');
            
            // зІҫзҒөеӣҫжңӘеҠ иҪҪе®ҢжҲҗж—¶жҳҫзӨәеҠ иҪҪзҠ¶жҖ?
            if (!spritesLoaded) {
                classes.push('loading');
            }
            
            el.className = classes.join(' ');
            
            // еә”з”ЁзІҫзҒөеӣҫдҪҚзҪ?
            const spritePos = getSpritePosition(tile);
            if (spritePos && spritesLoaded) {
                el.style.cssText = spritePos;
            } else if (!spritesLoaded) {
                // еӣҫзүҮеҠ иҪҪдёӯпјҢе»¶иҝҹи®ҫзҪ®ж ·ејҸ
                el.dataset.spriteStyle = spritePos;
            } else {
                // еӨҮз”Ёж–Үеӯ—жҳҫзӨә
                el.classList.add('text-mode');
                const disp = formatTileNameMp(tile);
                el.innerHTML = `
                    <div class="tile-text">
                        <span class="tile-value" style="font-size:0.78rem;line-height:1.15;">${disp}</span>
                    </div>
                `;
            }
            
            el.title = formatTileNameMp(tile);
            return el;
        }

        // жёІжҹ“жҲ‘зҡ„еүҜйңІ
        function renderMyMelds(melds) {
            const container = document.getElementById('myMelds');
            container.innerHTML = '';

            melds.forEach(meld => {
                const group = document.createElement('div');
                group.className = 'meld-group';
                meld.tiles.forEach(tile => {
                    group.appendChild(createTileElement(tile, { small: true }));
                });
                container.appendChild(group);
            });
        }

        // жӣҙж–°еҮәзүҢеҢ?
        function updateDiscardArea() {
            // жӣҙж–°дёӯеӨ®еү©дҪҷзүҢж•°
            const centerDeckCount = document.getElementById('centerDeckCount');
            if (centerDeckCount) {
                centerDeckCount.textContent = gameState.deckRemaining;
            }
            
            // жҜҸдёӘзҺ©е®¶зҡ„ејғзүҢжҳҫзӨәеңЁиҮӘе·ұй—ЁеүҚ
            gameState.players.forEach(player => {
                const displaySeat = getDisplaySeat(player.seatIndex);
                const container = document.getElementById(`discards-${displaySeat}`);
                if (!container) return;
                
                container.innerHTML = '';
                player.discards.forEach(tile => {
                    const tileEl = createTileElement(tile, { small: true });
                    container.appendChild(tileEl);
                });
            });
        }

        // йҖүжӢ©жүӢзүҢпјҲеҸҢеҮ»зӣҙжҺҘеҮәзүҢпјү
        function selectTile(tileId) {
            console.log('йҖүзүҢ:', tileId, 'еҪ“еүҚзҺ©е®¶:', gameState.currentPlayerIndex, 'жҲ‘зҡ„еә§дҪҚ:', mySeatIndex, 'йҳ¶ж®ө:', gameState.turnPhase);
            
            // еҸӘиғҪеңЁиҮӘе·ұзҡ„еӣһеҗҲйҖүзүҢ
            if (gameState.currentPlayerIndex !== mySeatIndex) {
                showToast('дёҚжҳҜдҪ зҡ„еӣһеҗҲ');
                return;
            }
            
            // еҝ…йЎ»жҳҜеҮәзүҢйҳ¶ж®?
            if (gameState.turnPhase !== 'discard') {
                showToast('иҜ·зӯүеҫ…ж‘ёзү?..');
                return;
            }
            
            if (selectedTileId === tileId) {
                // еҸҢеҮ»зӣҙжҺҘеҮәзүҢ
                discardTile();
                return;
            } else {
                selectedTileId = tileId;
            }
            
            document.querySelectorAll('#myHand .tile').forEach(el => {
                el.classList.remove('selected');
            });
            
            if (selectedTileId) {
                const myPlayer = gameState.players.find(p => p.seatIndex === mySeatIndex);
                const tileIndex = myPlayer.hand.findIndex(t => t.id === selectedTileId);
                if (tileIndex !== -1) {
                    document.querySelectorAll('#myHand .tile')[tileIndex]?.classList.add('selected');
                }
            }
            
            document.getElementById('discardBtn').disabled = !selectedTileId;
        }

        // жӣҙж–°еҠЁдҪңжҢүй’®
        function updateActionButtons() {
            const isMyTurn = gameState.currentPlayerIndex === mySeatIndex;
            const actionBtns = document.getElementById('actionButtons');
            
            // еҸӘеңЁеҮәзүҢйҳ¶ж®өжҳҫзӨәеҮәзүҢжҢүй’®пјҲж‘ёзүҢжҳҜиҮӘеҠЁзҡ„пјү
            if (isMyTurn && gameState.turnPhase === 'discard') {
                actionBtns.classList.add('active');
                document.getElementById('discardBtn').disabled = !selectedTileId;
            } else {
                actionBtns.classList.remove('active');
            }
        }

        // жҳҫзӨәе“Қеә”жҢүй’®
        function showResponseButtons(actions, data) {
            const container = document.getElementById('responseButtons');
            container.classList.add('active');
            
            container.querySelectorAll('.action-btn').forEach(btn => {
                let show = false;
                
                if (btn.classList.contains('hu')) {
                    // иғЎзүҢжҢүй’®пјҡж”ҜжҢ?hu е’?hu_zimo
                    show = actions.includes('hu') || actions.includes('hu_zimo');
                    if (show) {
                        btn.onclick = () => doAction(actions.includes('hu_zimo') ? 'hu_zimo' : 'hu');
                        btn.textContent = actions.includes('hu_zimo') ? 'иҮӘж‘ё' : 'иғ?;
                    }
                } else if (btn.classList.contains('an-gang')) {
                    show = actions.includes('an_gang');
                } else if (btn.classList.contains('jia-gang')) {
                    show = actions.includes('jia_gang');
                } else if (btn.classList.contains('ming-gang')) {
                    show = actions.includes('gang');
                } else if (btn.classList.contains('peng')) {
                    show = actions.includes('peng');
                } else if (btn.classList.contains('pass')) {
                    show = true; // иҝ?always visible
                }
                
                btn.style.display = show ? 'block' : 'none';
            });

            document.getElementById('actionButtons').classList.remove('active');
        }

        // йҡҗи—Ҹе“Қеә”жҢүй’®
        function hideResponseButtons() {
            document.getElementById('responseButtons').classList.remove('active');
            document.getElementById('actionButtons').classList.add('active');
        }

        // жүӢеҠЁж‘ёзүҢпјҲеӨҮз”Ёпјү
        function drawTile() {
            socket.emit('draw_tile');
        }
        
        // иҮӘеҠЁж‘ёзүҢ
        function autoDrawTile() {
            if (!gameState || gameState.currentPlayerIndex !== mySeatIndex) return;
            if (gameState.turnPhase !== 'draw') return;
            
            console.log('иҮӘеҠЁж‘ёзүҢ...');
            socket.emit('draw_tile');
        }

        // еҮәзүҢ
        function discardTile() {
            if (!selectedTileId) {
                showToast('иҜ·е…ҲйҖүжӢ©иҰҒжү“еҮәзҡ„зү?, 2000, 'warning');
                return;
            }
            
            // еҰӮжһңе·Іеҗ¬зүҢпјҢеҸӘиғҪжү“еҲҡж‘ёзҡ„зү?
            if (isTing && selectedTileId !== lastDrawnTileId) {
                showToast('е·Іеҗ¬зүҢпјҢеҸӘиғҪжү“еҲҡж‘ёзҡ„зүҢпјҒ');
                return;
            }
            
            // жё…йҷӨеҲҡж‘ёзҡ„зүҢж Үи®°
            lastDrawnTileId = null;
            
            // гҖҗж–°еўһгҖ‘еҒңжӯўеҮәзүҢеҖ’и®Ўж—?
            stopDiscardCountdown();
            
            socket.emit('discard_tile', { tileId: selectedTileId });
            selectedTileId = null;
            
            // еҮәзүҢеҗҺжЈҖжөӢеҗ¬зүҢпјҲе»¶иҝҹзӯүеҫ…жңҚеҠЎеҷЁжӣҙж–°пјү
            setTimeout(() => {
                if (!isTing) {
                    checkAndShowTing();
                }
            }, 500);
        }

        // жү§иЎҢеҠЁдҪң
        function doAction(action) {
            console.log('жү§иЎҢеҠЁдҪң:', action);
            socket.emit('player_action', { action });
            hideResponseButtons();
            
            // жҳҫзӨәеҠЁдҪңзү№ж•Ҳе’Ңж’ӯж”ҫйҹійў?
            const myVoice = getPlayerVoiceBySeat(mySeatIndex);
            
            if (action === 'peng') {
                showActionEffect('peng');
                playActionAudio('peng', myVoice);
            } else if (action === 'gang' || action === 'an_gang' || action === 'jia_gang') {
                showActionEffect('gang');
                playActionAudio('gang', myVoice);
            } else if (action === 'hu' || action === 'hu_zimo') {
                showActionEffect(action);
                playActionAudio('hu', myVoice);
            }
        }
        
        // гҖҗж–°еўһгҖ‘еҮәзүҢеҖ’и®Ўж—¶зӣёе…?
        let discardCountdownTimer = null;
        let discardCountdownValue = 0;
        
        function startDiscardCountdown(seconds) {
            stopDiscardCountdown(); // е…Ҳжё…йҷӨд№ӢеүҚзҡ„
            discardCountdownValue = seconds;
            
            // еҲӣе»әжҲ–жӣҙж–°еҖ’и®Ўж—¶жҳҫзӨ?
            let countdownEl = document.getElementById('discardCountdown');
            if (!countdownEl) {
                countdownEl = document.createElement('div');
                countdownEl.id = 'discardCountdown';
                countdownEl.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background: rgba(0, 0, 0, 0.8);
                    color: #FFD700;
                    font-size: 48px;
                    font-weight: bold;
                    padding: 20px 40px;
                    border-radius: 15px;
                    z-index: 1000;
                    pointer-events: none;
                    transition: opacity 0.3s;
                `;
                document.body.appendChild(countdownEl);
            }
            
            countdownEl.style.display = 'block';
            countdownEl.style.opacity = '1';
            updateCountdownDisplay();
            
            discardCountdownTimer = setInterval(() => {
                discardCountdownValue--;
                if (discardCountdownValue <= 0) {
                    stopDiscardCountdown();
                } else {
                    updateCountdownDisplay();
                    // жңҖеҗ?з§’еҸҳзәўиүІиӯҰе‘Ҡ
                    if (discardCountdownValue <= 5) {
                        countdownEl.style.color = '#FF4444';
                    }
                }
            }, 1000);
        }
        
        function updateCountdownDisplay() {
            const countdownEl = document.getElementById('discardCountdown');
            if (countdownEl) {
                countdownEl.textContent = `вҸ?${discardCountdownValue}`;
            }
        }
        
        function stopDiscardCountdown() {
            if (discardCountdownTimer) {
                clearInterval(discardCountdownTimer);
                discardCountdownTimer = null;
            }
            const countdownEl = document.getElementById('discardCountdown');
            if (countdownEl) {
                countdownEl.style.opacity = '0';
                setTimeout(() => {
                    countdownEl.style.display = 'none';
                    countdownEl.style.color = '#FFD700'; // йҮҚзҪ®йўңиүІ
                }, 300);
            }
        }

        // иҺ·еҸ–зүҢеҗҚ
        function getTileName(tile) {
            return formatTileNameMp(tile);
        }

        // иҜӯйҹіж’ӯжҠҘ
        function speakTile(tile) {
            if ('speechSynthesis' in window) {
                const text = getTileName(tile);
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 1.2;
                speechSynthesis.speak(utterance);
            }
        }

        // жҳҫзӨәз»“жһң
        function showResult(result, players) {

        function closeResult() {

            document.getElementById('gameScreen').classList.remove('active');
            document.getElementById('roomScreen').classList.add('active');

        // ==================== и®ЎеҲҶзі»з»ҹ UI ====================
        
        // еҪ“еүҚжҜ”иөӣзҡ„з§ҜеҲ?
        let matchScores = [0, 0, 0, 0];
        let currentRound = 1;
        let totalRounds = 10;
        
        // жӣҙж–°з§ҜеҲҶйқўжқҝ
        function updateScorePanel(scores) {
            matchScores = scores;
            for (let i = 0; i < 4; i++) {

                const scoreEl = document.getElementById(`score-${displaySeat}`);

        // жӣҙж–°еұҖж•°жҳҫзӨ?
        function updateRoundDisplay(current, total) {

            totalRounds = total;
            document.getElementById('currentRoundNum').textContent = current;
            document.getElementById('totalRoundsText').textContent = total;
        }
        
        // жҳҫзӨәеҚ•еұҖз»“з®—
        function showRoundResult(data) {
            const { roundResult, currentRound, totalRounds, matchScores } = data;
            
            // жӣҙж–°з§ҜеҲҶйқўжқҝ
            updateScorePanel(matchScores);
            
            // и®ҫзҪ®ж Үйўҳ
            let title = 'жң¬еұҖз»“з®—';
            if (roundResult.resultType === 'draw') {

                document.getElementById('huaDetailList').style.display = 'none';

            document.getElementById('roundResultTitle').textContent = title;
            
            // жҳҫзӨәз§ҜеҲҶеҸҳеҢ–пјҲиЎЁж јж ·ејҸпјҢж— иЎЁж јзәҝпј?
            const scoreChangeItems = document.getElementById('scoreChangeItems');
            
            // жҢүжң¬еұҖеҫ—еҲҶжҺ’еәҸ

        // зғҹиҠұж•Ҳжһң
        function showFireworks() {
            const container = document.getElementById('fireworksContainer');
            if (!container) return;
            
            const colors = ['#FFD700', '#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7', '#DDA0DD', '#98D8C8'];
            const fireworkCount = window.innerWidth < 768 ? 5 : 10;
            
            for (let i = 0; i < fireworkCount; i++) {
                setTimeout(() => {
                    createFirework(container, colors);
                }, i * 200);
            }
        }
        
        function createFirework(container, colors) {
            const x = 20 + Math.random() * 60; // 20% ~ 80% еұҸе№•е®ҪеәҰ
            const y = 20 + Math.random() * 40; // 20% ~ 60% еұҸе№•й«ҳеәҰ
            const color = colors[Math.floor(Math.random() * colors.length)];
            const particleCount = 12;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'firework-particle';
                particle.style.left = x + '%';
                particle.style.top = y + '%';
                particle.style.background = color;
                particle.style.boxShadow = `0 0 6px ${color}`;
                
                // и®Ўз®—зІ’еӯҗйЈһиЎҢж–№еҗ‘
                const angle = (i / particleCount) * 2 * Math.PI;
                const distance = 50 + Math.random() * 100;
                const endX = Math.cos(angle) * distance;
                const endY = Math.sin(angle) * distance;
                particle.style.setProperty('--particle-end', `translate(${endX}px, ${endY}px)`);
                
                container.appendChild(particle);
                
                // еҠЁз”»з»“жқҹеҗҺз§»йҷ?
                setTimeout(() => particle.remove(), 1200);
            }
        }

            setTimeout(() => {
                tileElement.classList.remove('drawing');
            }, 400);
        }
        
        // зүҢйқўзӮ№еҮ»жіўзә№ж•Ҳжһң
        function createTileRipple(event, tileElement) {
            if (document.body.classList.contains('reduce-motion')) return;
            
            const rect = tileElement.getBoundingClientRect();
            const ripple = document.createElement('div');
            ripple.className = 'tile-ripple';
            ripple.style.left = (event.clientX - rect.left) + 'px';
            ripple.style.top = (event.clientY - rect.top) + 'px';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            
            tileElement.style.position = 'relative';
            tileElement.style.overflow = 'hidden';
            tileElement.appendChild(ripple);
            
            setTimeout(() => ripple.remove(), 600);
        }
        
        // еҸ‘йҖҒиЎЁжғ…пјҲе·Іе№¶е…ҘиҒҠеӨ©йқўжқҝпјү
        function sendEmoji(emoji) {
            if (!socket) return;
            socket.emit('chat_message', { text: emoji, isEmoji: true });
            showEmojiBubble(emoji, mySeatIndex);
            closeAllChatPickers();
        }
        
        // жҳҫзӨәиЎЁжғ…ж°”жіЎ
        function showEmojiBubble(emoji, seatIndex) {
            // иҺ·еҸ–еҜ№еә”еә§дҪҚзҡ„дҪҚзҪ?
            const displaySeat = typeof seatIndex === 'number' ? getDisplaySeat(seatIndex) : seatIndex;
            const seatEl = document.querySelector(`.seat-${displaySeat} .seat-avatar`) ||
                          document.querySelector(`#seat-${displaySeat} .seat-avatar`);
            
            if (!seatEl) return;
            
            const rect = seatEl.getBoundingClientRect();
            const bubble = document.createElement('div');
            bubble.className = 'emoji-bubble';
            bubble.textContent = emoji;
            bubble.style.left = rect.left + rect.width / 2 + 'px';
            bubble.style.top = rect.top + 'px';
            
            document.body.appendChild(bubble);
            
            setTimeout(() => bubble.remove(), 2000);
        }
        
        // иҰҶзӣ–еҺҹжңүзҡ?showToast еҮҪж•°пјҢж·»еҠ еҠЁз”»ж•Ҳжһ?
        const originalShowToast = showToast;
        showToast = function(message, duration = 2000) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.textContent = message;
            toast.style.animation = 'none';
            toast.style.opacity = '0';
            toast.style.transform = 'translate(-50%, 10px)';
            
            document.body.appendChild(toast);
            
            // ејәеҲ¶йҮҚз»ҳеҗҺж·»еҠ еҠЁз”?
            requestAnimationFrame(() => {
                toast.style.transition = 'all 0.3s ease-out';
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, 0)';
            });
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -10px)';
                setTimeout(() => toast.remove(), 300);
            }, duration);
        };
        
        // еўһејәжёёжҲҸзҠ¶жҖҒжӣҙж–°пјҢж·»еҠ еҠЁз”»ж•Ҳжһң
        const originalUpdateGameUI = scheduleUpdate;
        
        // жіЁпјҡaction_executed е’?emoji_received дәӢд»¶зӣ‘еҗ¬е·ІеңЁ connectServer() дёӯжіЁеҶ?
        
        // йЎөйқўеҠ иҪҪж—¶еҲқе§ӢеҢ–зІ’еӯҗж•Ҳжһң
        document.addEventListener('DOMContentLoaded', () => {
            initParticles();
            
            // дёәжүӢзүҢж·»еҠ зӮ№еҮ»жіўзә№ж•Ҳжһ?
            document.addEventListener('click', (e) => {
                const tile = e.target.closest('.tile');
                if (tile && !tile.classList.contains('back')) {
                    createTileRipple(e, tile);
                }
            });
        });
        
        // иҰҶзӣ–жӣҙж–°жёёжҲҸUIпјҢж·»еҠ иҪ®еҲ°иҮӘе·ұзҡ„ж•Ҳжһң
        const _originalDoUpdateGameUI = typeof _doUpdateGameUI !== 'undefined' ? _doUpdateGameUI : null;
        if (_originalDoUpdateGameUI) {
            const wrappedUpdateGameUI = _originalDoUpdateGameUI;
            _doUpdateGameUI = function() {
                wrappedUpdateGameUI.apply(this, arguments);
                
                // жЈҖжҹҘжҳҜеҗҰиҪ®еҲ°иҮӘе·?
                if (gameState) {
                    const isMyTurn = gameState.currentPlayerIndex === mySeatIndex;
                    const isDiscardPhase = gameState.turnPhase === 'discard';
                    updateMyTurnEffect(isMyTurn && isDiscardPhase);
                }
            };
        }
        
        // еҠ иҪҪи®ҝй—®з»ҹи®Ў
        function loadSiteStats() {
            const base = window.location.origin + window.location.pathname.replace(/\/index\.html$/, '').replace(/\/$/, '');
            fetch(base + '/api/stats').then(r => {
                if (!r.ok) throw new Error(r.status);
                return r.json();
            }).then(data => {
                const el = document.getElementById('siteStats');
                if (el) {
                    const online = (data.online?.mahjong || 0) + (data.online?.gomoku || 0);
                    el.textContent = `д»Ҡж—Ҙи®ҝй—® ${data.today?.pv || 0} В· зҙҜи®Ў ${data.total_pv || 0}` + (online > 0 ? ` В· еңЁзәҝ ${online}` : '');
                }
            }).catch(e => console.log('stats fetch error:', e));
        }

        // еҲқе§ӢеҢ?
        connectServer();
        loadSiteStats();
    </script>
</body>
</html>
